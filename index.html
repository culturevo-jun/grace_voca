<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW TEPS VOCA — Grace</title>
<style>
:root {
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#0F6E56;--teal-ll:#9FE1CB;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-ll:#B5D4F4;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --red:#E24B4A;--red-l:#FCEBEB;
  --gray:#5F5E5A;--gray-l:#F1EFE8;--gray-ll:#D3D1C7;
  --text:#2C2C2A;--text-m:#888780;--text-h:#444441;
  --bg:#fff;--bg2:#F1EFE8;--bd:rgba(0,0,0,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efea;color:var(--text);min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:16px}

/* Typography */
h2{font-size:18px;font-weight:600;margin-bottom:4px}
h3{font-size:15px;font-weight:600}
p{font-size:14px;line-height:1.6;color:var(--text-h)}

/* Card */
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:18px 20px;margin-bottom:12px}
.card-sm{background:var(--bg);border:0.5px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:8px}

/* Buttons */
.btn{border:0.5px solid var(--bd);background:var(--bg);border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn.teal{background:var(--teal);color:#fff;border-color:var(--teal-d)}
.btn.teal:hover{background:var(--teal-d)}
.btn.blue{background:var(--blue-l);color:var(--blue);border-color:var(--blue-ll)}
.btn.blue:hover{background:#dae9f8}
.btn.full{width:100%;justify-content:center;padding:13px;font-size:15px}
.btn.sm{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.4;cursor:default}

/* Tag */
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
.tag-teal{background:var(--teal-l);color:var(--teal-d)}
.tag-blue{background:var(--blue-l);color:var(--blue)}
.tag-amber{background:var(--amber-l);color:var(--amber)}
.tag-gray{background:var(--gray-l);color:var(--gray)}
.tag-red{background:var(--red-l);color:var(--red)}

/* Screen */
.screen{display:none}
.screen.active{display:block}

/* ──────── HOME ──────── */
.home-header{text-align:center;padding:20px 0 14px}
.home-header h1{font-size:24px;font-weight:700;color:var(--text)}
.home-header p{font-size:13px;color:var(--text-m);margin-top:3px}

.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:4px}
.day-btn{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:14px 12px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.day-btn:hover{border-color:var(--teal);background:var(--teal-l)}
.day-btn.active{border-color:var(--teal);background:var(--teal-l)}
.day-btn .db-num{font-size:16px;font-weight:700;color:var(--teal);margin-bottom:2px}
.day-btn .db-theme{font-size:11px;color:var(--text-m);margin-bottom:6px;line-height:1.4}
.day-btn .db-cnt{font-size:11px;font-weight:500;color:var(--text-h)}
.day-btn.locked{opacity:.4;cursor:not-allowed}
.day-btn.locked:hover{border-color:var(--bd);background:var(--bg)}

.step-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.step-tab{border:1.5px solid var(--bd);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:all .15s;background:var(--bg);font-family:inherit}
.step-tab:hover{border-color:var(--teal)}
.step-tab.active{border-color:var(--teal);background:var(--teal-l)}
.step-tab .st-icon{font-size:22px;margin-bottom:5px}
.step-tab .st-title{font-size:14px;font-weight:600;color:var(--text)}
.step-tab .st-desc{font-size:11px;color:var(--text-m);margin-top:2px}

/* ──────── LEARN (Step 1) ──────── */
.learn-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.learn-prog-bar{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.learn-prog-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s}
.learn-prog-text{font-size:12px;color:var(--text-m);white-space:nowrap}

.word-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:14px;padding:22px 22px 18px;margin-bottom:10px}
.wc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.wc-word{font-size:32px;font-weight:700;color:var(--text);line-height:1.2}
.wc-pron{font-size:13px;color:var(--text-m);margin-top:3px}
.wc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.wc-meaning{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.5}
.wc-meaning-en{font-size:13px;color:var(--text-m);margin-bottom:12px}

.section-label{font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.phrase-row{display:flex;gap:8px;margin-bottom:5px;font-size:13px;line-height:1.5}
.phrase-en{color:var(--teal-d);font-weight:500;min-width:0}
.phrase-kr{color:var(--text-h)}
.ex-box{background:var(--blue-l);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:10px 12px;margin-top:8px}
.ex-en{font-size:13px;font-weight:500;color:var(--blue);line-height:1.6;margin-bottom:4px}
.ex-kr{font-size:12px;color:var(--text-m);line-height:1.5}
.ex-kw{font-weight:700;color:var(--blue)}

.voca-box{background:var(--gray-l);border-radius:8px;padding:8px 12px;margin-top:8px}
.voca-item{font-size:12px;color:var(--text-h);line-height:1.7}
.voca-word{font-weight:600;color:var(--text)}

.learn-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px}
.nav-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;flex:1}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-ll);cursor:pointer;transition:all .15s;flex-shrink:0}
.nav-dot.seen{background:var(--teal-ll)}
.nav-dot.current{background:var(--teal);transform:scale(1.3)}

/* ──────── TEST (Step 2) ──────── */
.test-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hearts{display:flex;gap:3px}
.heart{font-size:18px;color:var(--red);transition:opacity .3s}
.heart.dead{opacity:.18}
.score-disp{font-size:14px;font-weight:600;color:var(--teal)}
.q-count{font-size:13px;color:var(--text-m)}
.prog-bar{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .4s}

.q-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:20px;min-height:280px}
.q-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.q-word{font-size:26px;font-weight:700;color:var(--text);margin-bottom:5px}
.q-sub{font-size:13px;color:var(--text-m);margin-bottom:16px;line-height:1.5}

.choice{width:100%;text-align:left;padding:12px 16px;margin:5px 0;border:1px solid var(--bd);border-radius:8px;background:var(--bg);cursor:pointer;font-size:14px;color:var(--text);font-family:inherit;transition:all .15s;line-height:1.5}
.choice:hover:not(:disabled){background:var(--bg2);border-color:var(--teal)}
.choice.correct{background:var(--teal-l)!important;border-color:var(--teal)!important;color:#085041!important;font-weight:500}
.choice.wrong{background:var(--red-l)!important;border-color:var(--red)!important;color:#501313!important}

.spell-inp{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:12px 16px;font-size:18px;text-align:center;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
.spell-inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.spell-inp.ok{border-color:var(--teal);background:var(--teal-l)}
.spell-inp.ng{border-color:var(--red);background:var(--red-l)}

.feedback{padding:12px 16px;border-radius:8px;font-size:14px;margin:10px 0;line-height:1.6;border-left:3px solid}
.feedback.ok{background:var(--teal-l);color:#085041;border-color:var(--teal)}
.feedback.ng{background:var(--red-l);color:#501313;border-color:var(--red)}
.feedback-ex{font-size:12px;margin-top:5px;opacity:.85}

/* ──────── RESULT ──────── */
.res-emoji{font-size:46px;text-align:center;margin:8px 0}
.res-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:5px}
.res-sub{font-size:13px;color:var(--text-m);text-align:center;margin-bottom:18px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--bg2);border-radius:8px;padding:12px;text-align:center}
.stat-l{font-size:11px;color:var(--text-m)}
.stat-v{font-size:22px;font-weight:700}

/* Divider */
hr{border:none;border-top:0.5px solid var(--bd);margin:14px 0}

/* Notif */
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.notif.show{opacity:1}
</style>
</head>
<body>
<div class="app">

<!-- ═══════════════ HOME ═══════════════ -->
<div id="s-home" class="screen active">
  <div class="home-header">
    <h1>📚 NEW TEPS VOCA</h1>
    <p>서울대 최신기출 · Grace</p>
  </div>

  <div class="card">
    <div style="font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Day 선택</div>
    <div class="day-grid" id="day-grid"></div>
  </div>

  <div class="card">
    <div style="font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">학습 단계</div>
    <div class="step-tabs">
      <div class="step-tab active" id="tab-learn" onclick="selectStep('learn')">
        <div class="st-icon">📖</div>
        <div class="st-title">Step 1 · 학습</div>
        <div class="st-desc">단어 · 숙어 · 예문 학습</div>
      </div>
      <div class="step-tab" id="tab-test" onclick="selectStep('test')">
        <div class="st-icon">✏️</div>
        <div class="st-title">Step 2 · 테스트</div>
        <div class="st-desc">전체 단어 테스트</div>
      </div>
    </div>
    <div style="margin-top:10px">
      <div style="font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">테스트 모드</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="mode-btns">
        <button class="btn sm teal" id="m-mc" onclick="selectMode('mc')">🎯 뜻 고르기</button>
        <button class="btn sm" id="m-rev" onclick="selectMode('rev')">🔄 한→영 선택</button>
        <button class="btn sm" id="m-sp" onclick="selectMode('sp')">✏️ 영단어 입력</button>
        <button class="btn sm" id="m-mix" onclick="selectMode('mix')">🎲 랜덤 혼합</button>
      </div>
    </div>
  </div>

  <button class="btn teal full" onclick="go()" id="go-btn">시작하기</button>
  <div style="font-size:12px;color:var(--text-m);text-align:center;margin-top:8px" id="go-hint">Day와 단계를 선택하세요</div>
</div>

<!-- ═══════════════ LEARN ═══════════════ -->
<div id="s-learn" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="btn sm" onclick="backHome()">← 홈</button>
    <div style="font-size:13px;font-weight:600" id="learn-title"></div>
    <div style="font-size:12px;color:var(--text-m)" id="learn-idx"></div>
  </div>
  <div class="learn-progress">
    <div class="learn-prog-bar"><div class="learn-prog-fill" id="learn-prog"></div></div>
    <div class="learn-prog-text" id="learn-prog-t"></div>
  </div>

  <div class="word-card" id="word-card">
    <!-- filled by JS -->
  </div>

  <div class="learn-nav">
    <button class="btn sm" id="prev-btn" onclick="learnNav(-1)">← 이전</button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="btn sm teal" id="next-btn" onclick="learnNav(1)">다음 →</button>
  </div>

  <div style="margin-top:12px;text-align:center">
    <button class="btn blue" onclick="goTestFromLearn()">✏️ Step 2 테스트 바로 가기</button>
  </div>
</div>

<!-- ═══════════════ TEST ═══════════════ -->
<div id="s-test" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <button class="btn sm" onclick="backHome()">← 홈</button>
    <div style="font-size:13px;font-weight:600" id="test-title"></div>
    <span></span>
  </div>
  <div class="test-meta">
    <div class="hearts"><span class="heart" id="h1">♥</span><span class="heart" id="h2">♥</span><span class="heart" id="h3">♥</span></div>
    <span class="q-count" id="q-cnt">1 / 20</span>
    <span class="score-disp" id="sc">0점</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="q-prog"></div></div>
  <div class="q-card">
    <div class="q-tags" id="q-tags"></div>
    <div id="area-mc">
      <div class="q-word" id="q-word"></div>
      <div class="q-sub" id="q-sub"></div>
      <div id="mc-wrap"></div>
    </div>
    <div id="area-sp" style="display:none">
      <div class="q-word" id="sp-mean" style="font-size:17px;font-weight:600;line-height:1.5"></div>
      <div class="q-sub" id="sp-hint"></div>
      <input class="spell-inp" id="sp-inp" placeholder="영단어를 입력하세요" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn teal full" onclick="chkSpell()" style="margin-top:10px">확인</button>
    </div>
    <div id="fb"></div>
    <button class="btn teal full" id="nxt" onclick="nextQ()" style="margin-top:12px;display:none">다음 →</button>
  </div>
  <button class="btn" onclick="backHome()" style="width:100%;justify-content:center;margin-top:8px;color:var(--text-m)">그만하기</button>
</div>

<!-- ═══════════════ RESULT ═══════════════ -->
<div id="s-result" class="screen">
  <div class="card">
    <div class="res-emoji" id="r-emoji">🏆</div>
    <div class="res-title" id="r-title"></div>
    <div class="res-sub" id="r-sub"></div>
    <div class="stat-row">
      <div class="stat"><div class="stat-l">점수</div><div class="stat-v" id="r-sc"></div></div>
      <div class="stat"><div class="stat-l">정답률</div><div class="stat-v" id="r-rt"></div></div>
      <div class="stat"><div class="stat-l">최대연속</div><div class="stat-v" id="r-st"></div></div>
    </div>
    <div id="r-miss" style="margin-bottom:12px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="backHome()" style="flex:1;justify-content:center">🏠 홈</button>
      <button class="btn teal" onclick="retryTest()" style="flex:1;justify-content:center">🔄 다시 도전</button>
    </div>
  </div>
</div>

</div>
<div class="notif" id="notif"></div>

<script>
// ══════════════════════════════════════════
//  DATABASE
// ══════════════════════════════════════════
const DB = {
  5:{
    theme:'Communications',
    theme_kr:'의사소통',
    words:[
      {w:'recount',pos:'v',m:'자세히 이야기하다',
       syn:'depict 묘사하다 / portray 그리다 / describe 설명하다',
       phrases:['be vividly recounted|생생하게 묘사된','recount an anecdote|일화를 이야기하다'],
       ex:'In his new book, Mr. Turner <b>recounts</b> the lessons he learned on running a business.',
       ex_kr:'터너 씨는 그의 새 책에서 사업 운영에 대해 배운 교훈을 이야기하고 있다.'},
      {w:'aggressive',pos:'a',m:'공격적인; 적극적인',
       syn:'regress 퇴보하다 / progress 진전하다 / transgress 위반하다',
       phrases:['an aggressive marketing campaign|적극적인 마케팅 활동','take aggressive steps to|~하기 위한 적극적인 조치를 취하다'],
       ex:'Gorillas have often been portrayed as fierce and <b>aggressive</b> — perhaps because they\'re the largest of the primates.',
       ex_kr:'고릴라는 사납고 공격적인 동물로 자주 묘사된다. 아마도 영장류 중에서 가장 몸집이 크기 때문일 것이다.'},
      {w:'allude',pos:'v',m:'암시하다, 넌지시 말하다',
       syn:'allure 매혹하다 / elude 교묘히 피하다',
       phrases:['allude to one\'s marital troubles|결혼 문제들에 대해 넌지시 말하다','allude to a historical event|고사에 빗대어 말하다'],
       ex:'The general manager <b>alluded</b> to the product\'s failure during his presentation.',
       ex_kr:'총지배인은 프레젠테이션 중에 그 제품의 실패를 암시했다.',
       tip:'~을 암시하다: allude something (×) → allude to something (O)'},
      {w:'assert',pos:'v',m:'(강력히) 주장하다',
       syn:'affirm 확언하다 / allege 우겨대다',
       phrases:['assert one\'s rights|권리를 주장하다','assert that he is the criminal|그가 범인이라고 주장하다'],
       ex:'Considering these factors, Dr. Lofton <b>asserts</b> that the extinction rate is currently approaching one bird species per year.',
       ex_kr:'로프튼 박사는 이런 요인들을 감안하면 멸종률은 현재 매년 새의 한 종에 가깝다고 주장한다.'},
      {w:'bilingual',pos:'a',m:'2개 국어를 하는',
       syn:'monolingual 1개 국어를 하는 / multilingual 여러 언어를 하는',
       phrases:['bilingual in English and Japanese|영어와 일어를 할 줄 아는','provide bilingual education|2개 국어로 교육하다'],
       ex:'One of the approaches to attacking minority languages is the movement to oppose <b>bilingual</b> education.',
       ex_kr:'소수 언어를 공격하는 것에 대한 하나의 접근법은 이중 언어 교육을 반대하는 운동이다.'},
      {w:'blunt',pos:'a',m:'직설적인; 통명스러운; 무딘',
       syn:'blurt 불쑥 말하다',
       phrases:['make a blunt statement|직설적인 발언을 하다','blunt language|통명스러운 말투','a blunt knife|무딘 칼','a blunt pencil|(심이) 뭉툭한 연필'],
       ex:'Ms. Peterson\'s <b>blunt</b> style of speech often resulted in her coworkers taking offense.',
       ex_kr:'피터슨 씨의 직설적인 말투는 종종 동료들의 반감을 샀다.'},
      {w:'brag',pos:'v',m:'자랑하다, 떠벌리다',
       syn:'drag 질질 끌다',
       phrases:['brag about winning the game|경기에서 이긴 것을 자랑하다','brag that one\'s daughter is pretty|딸이 예쁘다고 자랑하다'],
       ex:'He <b>brags</b> too much about how much money he has.',
       ex_kr:'자기가 가진 돈이 얼마나 많은지 엄청 떠벌리더군요.'},
      {w:'coherent',pos:'a',m:'일관성 있는; 논리 정연한',
       syn:'adherent 접착성의 지지자',

       ex_kr:'쿡이 존의 작업에 대해 비판해서 존이 무척 화가 난 것 같아요.'},
      {w:'vacillate',pos:'v',m:'머뭇거리다; 오락가락하다, 동요하다',
       syn:'vaccinate 백신을 접종하다',
       phrases:['vacillate on this issue|이 문제에 대해 머뭇거리다','vacillate between hope and despair|희망과 절망 사이를 오락가락하다'],
       ex:'He\'s been <b>vacillating</b> between two options.',
       ex_kr:'그는 두 가지 선택 사이에서 망설이고 있다.'},
      {w:'volatile',pos:'a',m:'변덕스러운; 휘발성의',
       syn:'ductile 연성이 있는 유연한 / fertile 비옥한 풍부한 / futile 소용없는 쓸데없는',
       phrases:['a volatile disposition|변덕스러운 성질','a volatile exchange rate|불안정한 환율'],
       ex:'Beethoven had a very <b>volatile</b> personality.',
       ex_kr:'베토벤은 매우 변덕스러운 성격이었다.'}
    ]
  }
};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let S = {
  selDay: null, selStep: 'learn', selMode: 'mc',
  learnIdx: 0, learnDay: null,
  testDay: null, testMode: 'mc',
  testQs: [], testIdx: 0, score: 0, hearts: 3,
  streak: 0, maxStreak: 0, correct: 0,
  missedWords: []
};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function init() {
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  Object.keys(DB).forEach(d => {
    const day = DB[d];
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (String(d) === '5' ? ' active' : '');
    btn.dataset.day = d;
    btn.innerHTML = `<div class="db-num">Day ${d}</div>
      <div class="db-theme">${day.theme}<br>${day.theme_kr}</div>
      <div class="db-cnt">단어 ${day.words.length}개</div>`;
    btn.onclick = () => { selectDay(d); };
    grid.appendChild(btn);
  });
  selectDay('5');
  selectStep('learn');
  selectMode('mc');
}

function selectDay(d) {
  S.selDay = String(d);
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.dataset.day === String(d)));
  updateGoHint();
}

function selectStep(s) {
  S.selStep = s;
  document.getElementById('tab-learn').classList.toggle('active', s === 'learn');
  document.getElementById('tab-test').classList.toggle('active', s === 'test');
  document.getElementById('mode-btns').style.opacity = s === 'test' ? '1' : '0.4';
  document.getElementById('mode-btns').style.pointerEvents = s === 'test' ? 'auto' : 'none';
  updateGoHint();
}

function selectMode(m) {
  S.selMode = m;
  ['mc','rev','sp','mix'].forEach(id => {
    const btn = document.getElementById('m-' + id);
    const active = id === m;
    btn.className = 'btn sm' + (active ? ' teal' : '');
  });
}

function updateGoHint() {
  const hint = document.getElementById('go-hint');
  if (!S.selDay) { hint.textContent = 'Day를 선택하세요'; return; }
  const cnt = DB[S.selDay]?.words.length || 0;
  if (S.selStep === 'learn') hint.textContent = `Day ${S.selDay} · ${cnt}개 단어 학습`;
  else hint.textContent = `Day ${S.selDay} · ${cnt}개 단어 테스트`;
}

function go() {
  if (!S.selDay) { showNotif('Day를 선택하세요'); return; }
  if (S.selStep === 'learn') startLearn(S.selDay);
  else startTest(S.selDay, S.selMode);
}

// ══════════════════════════════════════════
//  LEARN
// ══════════════════════════════════════════
function startLearn(day) {
  S.learnDay = String(day);
  S.learnIdx = 0;
  const d = DB[day];
  document.getElementById('learn-title').textContent = `Day ${day} · ${d.theme_kr}`;
  showScreen('learn');
  renderLearnCard();
}

function renderLearnCard() {
  const d = DB[S.learnDay];
  const words = d.words;
  const idx = S.learnIdx;
  const w = words[idx];
  const total = words.length;

  document.getElementById('learn-idx').textContent = `${idx+1} / ${total}`;
  document.getElementById('learn-prog').style.width = `${((idx+1)/total)*100}%`;
  document.getElementById('learn-prog-t').textContent = `${idx+1}/${total}`;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').textContent = idx === total-1 ? '완료 ✓' : '다음 →';

  // Dots
  const dotsEl = document.getElementById('nav-dots');
  dotsEl.innerHTML = '';
  words.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (i < idx ? ' seen' : '') + (i === idx ? ' current' : '');
    dot.onclick = () => { S.learnIdx = i; renderLearnCard(); };
    dotsEl.appendChild(dot);
  });

  // Highlight keyword in ex
  let exHtml = w.ex || '';
  // build card
  let phrasesHtml = '';
  if (w.phrases && w.phrases.length) {
    phrasesHtml = `<div class="section-label" style="margin-top:14px">숙어 · 활용</div>`;
    w.phrases.forEach(p => {
      const [en, kr] = p.split('|');
      phrasesHtml += `<div class="phrase-row"><span class="phrase-en">${en}</span><span class="phrase-kr"> — ${kr}</span></div>`;
    });
  }

  let vocaHtml = '';
  if (w.syn) {
    vocaHtml = `<div class="voca-box" style="margin-top:12px">
      <div style="font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">VOCA+</div>
      ${w.syn.split(' / ').map(s => `<div class="voca-item">${s.replace(/^(\S+)/,'<span class="voca-word">$1</span>')}</div>`).join('')}
    </div>`;
  }

  let tipHtml = w.tip ? `<div style="font-size:12px;color:var(--amber);background:var(--amber-l);border-radius:6px;padding:7px 10px;margin-top:8px">📌 ${w.tip}</div>` : '';

  document.getElementById('word-card').innerHTML = `
    <div class="wc-top">
      <div>
        <div class="wc-word">${w.w}</div>
        ${w.pron ? `<div class="wc-pron">${w.pron}</div>` : ''}
      </div>
      <span class="tag tag-gray">${w.pos}</span>
    </div>
    <div class="wc-tags">
      <span class="tag ${S.learnDay=='5'?'tag-blue':'tag-teal'}">Day ${S.learnDay}</span>
    </div>
    <div class="wc-meaning">${w.m}</div>
    ${phrasesHtml}
    ${w.ex ? `
    <div class="section-label" style="margin-top:14px">기출 예문</div>
    <div class="ex-box">
      <div class="ex-en">${exHtml}</div>
      <div class="ex-kr">${w.ex_kr}</div>
    </div>` : ''}
    ${tipHtml}
    ${vocaHtml}
  `;
}

function learnNav(dir) {
  const total = DB[S.learnDay].words.length;
  const next = S.learnIdx + dir;
  if (next < 0) return;
  if (next >= total) {
    showNotif('🎉 Day ' + S.learnDay + ' 학습 완료!');
    backHome();
    return;
  }
  S.learnIdx = next;
  renderLearnCard();
}

function goTestFromLearn() {
  startTest(S.learnDay, S.selMode);
}

// ══════════════════════════════════════════
//  TEST
// ══════════════════════════════════════════
function startTest(day, mode) {
  S.testDay = String(day);
  S.testMode = mode || S.selMode;
  const pool = DB[day].words.map(w => ({...w, day: String(day)}));
  S.testQs = shuffle(pool);
  S.testIdx = 0; S.score = 0; S.hearts = 3;
  S.streak = 0; S.maxStreak = 0; S.correct = 0;
  S.missedWords = [];
  document.getElementById('test-title').textContent = `Day ${day} · 테스트`;
  showScreen('test');
  renderQ();
}

function renderQ() {
  if (S.testIdx >= S.testQs.length || S.hearts <= 0) { showResult(); return; }
  const q = S.testQs[S.testIdx];
  const total = S.testQs.length;

  document.getElementById('q-cnt').textContent = `${S.testIdx+1} / ${total}`;
  document.getElementById('q-prog').style.width = `${((S.testIdx+1)/total)*100}%`;
  document.getElementById('sc').textContent = `${S.score}점`;
  ['h1','h2','h3'].forEach((id,i) => document.getElementById(id).classList.toggle('dead', i >= S.hearts));

  let actualMode = S.testMode;
  if (S.testMode === 'mix') {
    const modes = ['mc','mc','rev','sp'];
    actualMode = modes[Math.floor(Math.random() * modes.length)];
  }
  S._curMode = actualMode;

  const mLabels = {mc:'뜻 고르기', rev:'한→영', sp:'영단어 입력'};
  const dayColor = q.day === '5' ? 'tag-blue' : 'tag-teal';
  const streakBadge = S.streak >= 2 ? `<span class="tag tag-amber">🔥 ${S.streak}연속</span>` : '';
  document.getElementById('q-tags').innerHTML =
    `<span class="tag ${dayColor}">Day ${q.day}</span><span class="tag tag-gray">${q.pos}</span><span class="tag" style="background:var(--gray-l);color:var(--gray)">${mLabels[actualMode]}</span>${streakBadge}`;

  document.getElementById('fb').innerHTML = '';
  document.getElementById('nxt').style.display = 'none';
  document.getElementById('area-mc').style.display = 'none';
  document.getElementById('area-sp').style.display = 'none';

  if (actualMode === 'mc') {
    document.getElementById('area-mc').style.display = 'block';
    document.getElementById('q-word').textContent = q.w;
    document.getElementById('q-word').style.fontSize = '';
    document.getElementById('q-sub').textContent = `(${q.pos})`;
    const wrong = shuffle(S.testQs.filter(x => x.w !== q.w)).slice(0,3).map(x => x.m);
    renderChoices(shuffle([q.m, ...wrong]), c => checkMC(c === q.m, q));
  } else if (actualMode === 'rev') {
    document.getElementById('area-mc').style.display = 'block';
    document.getElementById('q-word').style.fontSize = '17px';
    document.getElementById('q-word').textContent = q.m;
    document.getElementById('q-sub').textContent = `(${q.pos}) — 영단어를 고르세요`;
    const wrong = shuffle(S.testQs.filter(x => x.w !== q.w)).slice(0,3).map(x => x.w);
    renderChoices(shuffle([q.w, ...wrong]), c => checkMC(c === q.w, q));
  } else {
    document.getElementById('area-sp').style.display = 'block';
    document.getElementById('sp-mean').innerHTML = q.m;
    document.getElementById('sp-hint').textContent = `(${q.pos})`;
    const inp = document.getElementById('sp-inp');
    inp.value = ''; inp.disabled = false; inp.className = 'spell-inp';
    inp.onkeydown = e => { if (e.key === 'Enter') chkSpell(); };
    setTimeout(() => inp.focus(), 80);
  }
}

function renderChoices(choices, handler) {
  const wrap = document.getElementById('mc-wrap');
  wrap.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = `${String.fromCharCode(65+i)}. ${c}`;
    btn.onclick = () => handler(c, btn);
    wrap.appendChild(btn);
  });
}

function checkMC(isCorrect, q, clickedBtn) {
  // find and click was via handler — need to disable all
  const wrap = document.getElementById('mc-wrap');
  wrap.querySelectorAll('.choice').forEach(b => {
    b.disabled = true;
    const txt = b.textContent.slice(3);
    const isAns = S._curMode === 'rev' ? txt === q.w : txt === q.m;
    if (isAns) b.classList.add('correct');
  });
  // mark wrong if clicked wrong
  if (!isCorrect && clickedBtn) clickedBtn.classList.add('wrong');
  handleResult(isCorrect, q);
}

// override renderChoices to pass btn
function renderChoices(choices, handler) {
  const wrap = document.getElementById('mc-wrap');
  wrap.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = `${String.fromCharCode(65+i)}. ${c}`;
    btn.onclick = function() {
      wrap.querySelectorAll('.choice').forEach(b => b.disabled = true);
      const q = S.testQs[S.testIdx];
      const isCorrect = S._curMode === 'rev' ? c === q.w : c === q.m;
      wrap.querySelectorAll('.choice').forEach(b => {
        const txt = b.textContent.slice(3);
        const isAns = S._curMode === 'rev' ? txt === q.w : txt === q.m;
        if (isAns) b.classList.add('correct');
      });
      if (!isCorrect) btn.classList.add('wrong');
      handleResult(isCorrect, q);
    };
    wrap.appendChild(btn);
  });
}

function chkSpell() {
  const q = S.testQs[S.testIdx];
  const inp = document.getElementById('sp-inp');
  const ans = inp.value.trim().toLowerCase();
  inp.disabled = true;
  const ok = ans === q.w.toLowerCase();
  inp.classList.add(ok ? 'ok' : 'ng');
  handleResult(ok, q);
}

function handleResult(ok, q) {
  const fb = document.getElementById('fb');
  if (ok) {
    S.streak++; S.correct++;
    if (S.streak > S.maxStreak) S.maxStreak = S.streak;
    const bonus = S.streak >= 3 ? Math.min(S.streak, 5) * 2 : 0;
    S.score += 10 + bonus;
    const bonusTxt = bonus ? ` (+${bonus}점 보너스 🔥)` : '';
    fb.innerHTML = `<div class="feedback ok">✅ 정답!${bonusTxt}<br><strong>${q.w}</strong> = ${q.m}<div class="feedback-ex">📌 ${q.ex ? q.ex.replace(/<\/?b>/g,'') : ''}</div></div>`;
  } else {
    S.streak = 0; S.hearts--;
    S.missedWords.push(q.w);
    ['h1','h2','h3'].forEach((id,i) => document.getElementById(id).classList.toggle('dead', i >= S.hearts));
    fb.innerHTML = `<div class="feedback ng">❌ 틀렸어요!<br>정답: <strong>${q.w}</strong> = ${q.m}<div class="feedback-ex">📌 ${q.ex ? q.ex.replace(/<\/?b>/g,'') : ''}</div></div>`;
  }
  document.getElementById('sc').textContent = `${S.score}점`;
  if (S.hearts <= 0) { setTimeout(showResult, 1200); return; }
  document.getElementById('nxt').style.display = 'block';
}

function nextQ() {
  document.getElementById('sp-inp').className = 'spell-inp';
  S.testIdx++;
  renderQ();
}

// ══════════════════════════════════════════
//  RESULT
// ══════════════════════════════════════════
function showResult() {
  showScreen('result');
  const total = S.testQs.length;
  const rate = Math.round((S.correct / total) * 100);
  let emoji = '😅', title = '조금 더 연습해봐요!';
  if (rate >= 90) { emoji = '🏆'; title = '완벽해요!'; }
  else if (rate >= 70) { emoji = '🎉'; title = '잘했어요!'; }
  else if (rate >= 50) { emoji = '💪'; title = '좋아요, 계속 도전!'; }
  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-sub').textContent = `Day ${S.testDay} · ${total}문제`;
  document.getElementById('r-sc').textContent = S.score;
  document.getElementById('r-rt').textContent = rate + '%';
  document.getElementById('r-st').textContent = S.maxStreak + '🔥';
  const miss = S.missedWords;
  document.getElementById('r-miss').innerHTML = miss.length
    ? `<div style="font-size:12px;font-weight:600;color:var(--text-m);margin-bottom:6px">다시 볼 단어 (${miss.length}개)</div>` +
      miss.map(w => `<span style="display:inline-block;background:var(--red-l);color:#A32D2D;border-radius:6px;padding:3px 10px;margin:3px;font-size:13px;font-weight:500">${w}</span>`).join('')
    : '';
}

function retryTest() { startTest(S.testDay, S.testMode); }

// ══════════════════════════════════════════
//  UTIL
// ══════════════════════════════════════════
function shuffle(arr) { return [...arr].sort(() => Math.random()-.5); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
  window.scrollTo(0, 0);
}
function backHome() { showScreen('home'); }
function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

init();
</script>
