<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW TEPS VOCA — Grace</title>
<style>
:root{--teal:#1D9E75;--tl:#E1F5EE;--td:#0F6E56;--tll:#9FE1CB;--bl:#185FA5;--bll:#E6F1FB;--blll:#B5D4F4;--am:#BA7517;--aml:#FAEEDA;--rd:#E24B4A;--rdl:#FCEBEB;--gy:#5F5E5A;--gyl:#F1EFE8;--gyll:#D3D1C7;--tx:#2C2C2A;--txm:#888780;--txh:#444441;--bg:#fff;--bg2:#F1EFE8;--bd:rgba(0,0,0,0.13)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efea;color:var(--tx);min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:16px}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:12px;padding:18px 20px;margin-bottom:12px}
.btn{border:.5px solid var(--bd);background:var(--bg);border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer;color:var(--tx);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--bg2)}.btn.tl{background:var(--teal);color:#fff;border-color:var(--td)}.btn.tl:hover{background:var(--td)}.btn.bl{background:var(--bll);color:var(--bl);border-color:var(--blll)}.btn.bl:hover{background:#dae9f8}.btn.full{width:100%;justify-content:center;padding:13px;font-size:15px}.btn.sm{padding:6px 12px;font-size:13px}.btn:disabled{opacity:.4;cursor:default}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
.tg-tl{background:var(--tl);color:var(--td)}.tg-bl{background:var(--bll);color:var(--bl)}.tg-am{background:var(--aml);color:var(--am)}.tg-gy{background:var(--gyl);color:var(--gy)}.tg-rd{background:var(--rdl);color:var(--rd)}
.screen{display:none}.screen.active{display:block}
.hdr{text-align:center;padding:20px 0 14px}.hdr h1{font-size:24px;font-weight:700}.hdr p{font-size:13px;color:var(--txm);margin-top:3px}
.sec{font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:4px}
.dbtn{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:14px 12px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}.dbtn:hover{border-color:var(--teal);background:var(--tl)}.dbtn.act{border-color:var(--teal);background:var(--tl)}.dbtn.lk{opacity:.35;cursor:not-allowed}.dbtn.lk:hover{border-color:var(--bd);background:var(--bg)}
.dnum{font-size:16px;font-weight:700;color:var(--teal);margin-bottom:2px}.dthm{font-size:11px;color:var(--txm);margin-bottom:6px;line-height:1.4}.dcnt{font-size:11px;font-weight:500;color:var(--txh)}
.stabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.stab{border:1.5px solid var(--bd);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:all .15s;background:var(--bg);font-family:inherit}.stab:hover{border-color:var(--teal)}.stab.act{border-color:var(--teal);background:var(--tl)}
.stic{font-size:22px;margin-bottom:5px}.sttl{font-size:14px;font-weight:600}.stds{font-size:11px;color:var(--txm);margin-top:2px}
.lpb{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}.lpf{height:100%;background:var(--teal);border-radius:3px;transition:width .4s}
.wcard{background:var(--bg);border:.5px solid var(--bd);border-radius:14px;padding:22px 22px 18px;margin-bottom:10px}
.ww{font-size:32px;font-weight:700;line-height:1.2}.wm{font-size:16px;font-weight:600;margin-bottom:6px;line-height:1.5}
.phr{display:flex;gap:8px;margin-bottom:5px;font-size:13px;line-height:1.5}.phen{color:var(--td);font-weight:500}.phkr{color:var(--txh)}
.exbox{background:var(--bll);border-left:3px solid var(--bl);border-radius:0 8px 8px 0;padding:10px 12px;margin-top:8px}
.exen{font-size:13px;font-weight:500;color:var(--bl);line-height:1.6;margin-bottom:4px}.exkr{font-size:12px;color:var(--txm);line-height:1.5}
.vbox{background:var(--gyl);border-radius:8px;padding:8px 12px;margin-top:8px}.vi{font-size:12px;color:var(--txh);line-height:1.7}.vw{font-weight:600;color:var(--tx)}
.ndots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;flex:1}
.ndot{width:8px;height:8px;border-radius:50%;background:var(--gyll);cursor:pointer;transition:all .15s;flex-shrink:0}.ndot.seen{background:var(--tll)}.ndot.cur{background:var(--teal);transform:scale(1.3)}
.pgb{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-bottom:14px}.pgf{height:100%;background:var(--teal);border-radius:4px;transition:width .4s}
.qcard{background:var(--bg);border:.5px solid var(--bd);border-radius:12px;padding:20px;min-height:280px}
.qw{font-size:26px;font-weight:700;margin-bottom:5px}.qs{font-size:13px;color:var(--txm);margin-bottom:16px;line-height:1.5}
.cho{width:100%;text-align:left;padding:12px 16px;margin:5px 0;border:1px solid var(--bd);border-radius:8px;background:var(--bg);cursor:pointer;font-size:14px;color:var(--tx);font-family:inherit;transition:all .15s;line-height:1.5}
.cho:hover:not(:disabled){background:var(--bg2);border-color:var(--teal)}.cho.ok{background:var(--tl)!important;border-color:var(--teal)!important;color:#085041!important;font-weight:500}.cho.ng{background:var(--rdl)!important;border-color:var(--rd)!important;color:#501313!important}
.sinp{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:12px 16px;font-size:18px;text-align:center;font-family:inherit;background:var(--bg);color:var(--tx);outline:none;transition:border-color .2s}
.sinp:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.1)}.sinp.ok{border-color:var(--teal);background:var(--tl)}.sinp.ng{border-color:var(--rd);background:var(--rdl)}
.fb{padding:12px 16px;border-radius:8px;font-size:14px;margin:10px 0;line-height:1.6;border-left:3px solid}
.fb.ok{background:var(--tl);color:#085041;border-color:var(--teal)}.fb.ng{background:var(--rdl);color:#501313;border-color:var(--rd)}
.fbex{font-size:12px;margin-top:5px;opacity:.85}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sbox{background:var(--bg2);border-radius:8px;padding:12px;text-align:center}.sl{font-size:11px;color:var(--txm)}.sv{font-size:22px;font-weight:700}
.ht{font-size:18px;color:var(--rd);transition:opacity .3s}.ht.dead{opacity:.18}
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}.notif.show{opacity:1}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="hdr"><h1>📚 NEW TEPS VOCA</h1><p>서울대 최신기출 · Grace</p></div>
  <div class="card">
    <div class="sec">Day 선택</div>
    <div class="dgrid" id="day-grid"></div>
  </div>
  <div class="card">
    <div class="sec">학습 단계</div>
    <div class="stabs">
      <div class="stab act" id="tab-learn" onclick="selStep('learn')"><div class="stic">📖</div><div class="sttl">Step 1 · 학습</div><div class="stds">단어 · 숙어 · 예문 학습</div></div>
      <div class="stab" id="tab-test" onclick="selStep('test')"><div class="stic">✏️</div><div class="sttl">Step 2 · 테스트</div><div class="stds">전체 단어 테스트</div></div>
    </div>
    <div style="margin-top:10px">
      <div class="sec">테스트 모드</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="mbts">
        <button class="btn sm tl" id="m-mc" onclick="selMode('mc')">🎯 뜻 고르기</button>
        <button class="btn sm" id="m-rev" onclick="selMode('rev')">🔄 한→영</button>
        <button class="btn sm" id="m-sp" onclick="selMode('sp')">✏️ 영단어 입력</button>
        <button class="btn sm" id="m-mix" onclick="selMode('mix')">🎲 랜덤 혼합</button>
      </div>
    </div>
  </div>
  <button class="btn tl full" onclick="go()">시작하기</button>
  <div style="font-size:12px;color:var(--txm);text-align:center;margin-top:8px" id="go-hint">Day와 단계를 선택하세요</div>
</div>

<!-- LEARN -->
<div id="s-learn" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="btn sm" onclick="bkHome()">← 홈</button>
    <div style="font-size:13px;font-weight:600" id="ltitle"></div>
    <div style="font-size:12px;color:var(--txm)" id="lidx"></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div class="lpb"><div class="lpf" id="lprog"></div></div>
    <div style="font-size:12px;color:var(--txm);white-space:nowrap" id="lprogt"></div>
  </div>
  <div class="wcard" id="wcard"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px">
    <button class="btn sm" id="pbtn" onclick="lnav(-1)">← 이전</button>
    <div class="ndots" id="ndots"></div>
    <button class="btn sm tl" id="nbtn" onclick="lnav(1)">다음 →</button>
  </div>
  <div style="margin-top:12px;text-align:center">
    <button class="btn bl" onclick="goTst()">✏️ Step 2 테스트 바로 가기</button>
  </div>
</div>

<!-- TEST -->
<div id="s-test" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <button class="btn sm" onclick="bkHome()">← 홈</button>
    <div style="font-size:13px;font-weight:600" id="ttitle"></div>
    <span></span>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="display:flex;gap:3px"><span class="ht" id="h1">♥</span><span class="ht" id="h2">♥</span><span class="ht" id="h3">♥</span></div>
    <span style="font-size:13px;color:var(--txm)" id="qcnt">1/20</span>
    <span style="font-size:14px;font-weight:600;color:var(--teal)" id="sc">0점</span>
  </div>
  <div class="pgb"><div class="pgf" id="qpg"></div></div>
  <div class="qcard">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="qtags"></div>
    <div id="area-mc">
      <div class="qw" id="qword"></div>
      <div class="qs" id="qsub"></div>
      <div id="mcwrap"></div>
    </div>
    <div id="area-sp" style="display:none">
      <div class="qw" id="spmean" style="font-size:17px;font-weight:600;line-height:1.5"></div>
      <div class="qs" id="sphint"></div>
      <input class="sinp" id="spinp" placeholder="영단어를 입력하세요" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn tl full" onclick="chkSp()" style="margin-top:10px">확인</button>
    </div>
    <div id="fb"></div>
    <button class="btn tl full" id="nxt" onclick="nextQ()" style="margin-top:12px;display:none">다음 →</button>
  </div>
  <button class="btn" onclick="bkHome()" style="width:100%;justify-content:center;margin-top:8px;color:var(--txm)">그만하기</button>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="card">
    <div style="font-size:46px;text-align:center;margin:8px 0" id="remo">🏆</div>
    <div style="font-size:22px;font-weight:700;text-align:center;margin-bottom:5px" id="rtit"></div>
    <div style="font-size:13px;color:var(--txm);text-align:center;margin-bottom:18px" id="rsub"></div>
    <div class="srow">
      <div class="sbox"><div class="sl">점수</div><div class="sv" id="rsc"></div></div>
      <div class="sbox"><div class="sl">정답률</div><div class="sv" id="rrt"></div></div>
      <div class="sbox"><div class="sl">최대연속</div><div class="sv" id="rst"></div></div>
    </div>
    <div id="rmiss" style="margin-bottom:12px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="bkHome()" style="flex:1;justify-content:center">🏠 홈</button>
      <button class="btn tl" onclick="retry()" style="flex:1;justify-content:center">🔄 다시 도전</button>
    </div>
  </div>
</div>
</div>
<div class="notif" id="notif"></div>

<script>
const DB={
1:{theme:"Human Beings",theme_kr:"인간",words:[
{w:"yearn",pos:"v",m:"갈망하다",phrases:["secretly yearn|몰래 갈망하다","yearn for freedom|자유를 갈망하다"],ex:"Becoming an actor was the one thing Stuart desired, the thing he <b>yearned</b> most to achieve.",ex_kr:"배우가 되는 것은 스튜어트가 소망했던 그것, 가장 성취하기를 바랐던 것이었다.",syn:"long 갈망하다"},
{w:"adapt",pos:"v",m:"적응시키다",phrases:["the ability to adapt|적응 능력"],ex:"Some people have <b>adapted</b> themselves to living in inhospitable places like the desert.",ex_kr:"어떤 사람들은 사막과 같이 살기 힘든 장소에서 자신들을 적응시켰다.",syn:"adjust 조절하다 / accommodate 수용하다"},
{w:"satisfy",pos:"v",m:"만족시키다",phrases:["satisfy one's demands|요구를 충족시키다"],ex:"Polish & Shine offers a full refund to those who are not totally <b>satisfied</b> with its cleaning service.",ex_kr:"폴리쉐앤사인 사는 청소 서비스에 완전히 만족하지 않는 사람에게 전액 환불한다.",syn:"dissatisfied 불만스러워하는 / please 만족시키다"},
{w:"tolerate",pos:"v",m:"참다",phrases:["find something difficult to tolerate|참기 힘들다고 여기다"],ex:"I can't <b>tolerate</b> Donnie constantly being late.",ex_kr:"나는 도니가 끊임없이 지각하는 걸 참을 수가 없어.",syn:"endure 참다 / condone 용납하다"},
{w:"native",pos:"n/a",m:"출신자; 토착의",phrases:["native speakers of English|영어 원어민"],ex:"Jack is a California <b>native</b>.",ex_kr:"잭은 캘리포니아 출신이다.",syn:"indigenous 토착의 원산의"},
{w:"console",pos:"v",m:"위로하다",phrases:["console oneself|위안을 삼다"],ex:"I've attempted to <b>console</b> Jane several times.",ex_kr:"내가 제인을 몇 번 위로를 하려고 했어.",syn:"assuage 달래다"},
{w:"individual",pos:"a/n",m:"각각의, 개개의",phrases:["individual freedom|개인의 자유"],ex:"The board assesses each proposal on an <b>individual</b> basis before making a decision.",ex_kr:"이사회는 결정을 하기 전에 각 제안서를 개별적으로 평가한다.",syn:"unique 독특한"},
{w:"negative",pos:"a",m:"부정적인",phrases:["negative about an idea|어떤 생각에 대해 부정적인"],ex:"The word 'amateur' carries <b>negative</b> connotations for many people.",ex_kr:"'아마추어'라는 말은 많은 사람들에게 부정적인 의미를 내포한다.",syn:"positive 긍정적인 / pessimistic 비관적인 / optimistic 낙관적인"},
{w:"complain",pos:"v",m:"불평하다",phrases:["complain of stomachaches|복통을 호소하다"],ex:"The mother gave her kids equal amounts of cake so that no one could <b>complain</b>.",ex_kr:"엄마는 아이들에게 동일한 양의 케이크를 줘서 아무도 불평할 수 없었다.",syn:"compliment 칭찬하다 / approve 찬성하다"},
{w:"adjust",pos:"v",m:"적응하다; 조정[조절]하다",phrases:["adjust to the new school|새 학교에 적응하다","adjust a car seat|자동차의 좌석을 조절하다","adjust his tie|넥타이를 고쳐 매다"],ex:"They also need time to <b>adjust</b> to life in a post-parenting marriage.",ex_kr:"그들은 또한 육아 이후의 결혼 생활에 적응할 시간이 필요하다.",syn:"justice 정의 재판 / justify 합리화하다"},
{w:"categorize",pos:"v",m:"분류하다(classify)",phrases:["categorize people according to age|사람들을 나이별로 분류하다","be categorized as a socialist|사회주의자로 분류되다"],ex:"Other fluids, such as coffee, tea, beer, and soda might be <b>categorized</b> as unhealthy.",ex_kr:"커피, 차, 맥주, 청량음료와 같은 액체는 건강에 좋지 않은 것으로 분류될 수 있을 것이다.",syn:"catalogue 목록"},
{w:"characteristic",pos:"n/a",m:"특징, 특질; 특유의",phrases:["physical[genetic] characteristics|신체적[유전적] 특징들","A be characteristic of B|A는 B의 특징이다"],ex:"The research strongly suggests that emotional expression is a genetic <b>characteristic</b> shared by all humans.",ex_kr:"그 연구는 감정 표현이 모든 인간이 공유하는 유전적인 특징임을 강하게 시사하고 있다.",syn:"personality (남에게 비춰지는) 성격"},
{w:"contribute",pos:"v",m:"~의 한 원인이 되다; 기여하다; 기부[기증]하다",phrases:["contribute to his death|그의 죽음의 원인이 되다","contribute to the team's success|팀의 성공에 기여하다","contribute to a society|사회에 공헌하다"],ex:"Eating too much salty food may <b>contribute</b> to high blood pressure.",ex_kr:"짠 음식을 너무 많이 먹으면 고혈압을 일으킬 수 있다.",syn:"attribute (원인을) ~라고 여기다 / distribute 분배하다"},
{w:"cooperate",pos:"v",m:"협력하다(collaborate)",phrases:["cooperate with each other|서로 협력하다","cooperate with the investigation|수사에 협조하다"],ex:"Both parents then <b>cooperate</b> in guarding the nest, fanning the eggs with their fins.",ex_kr:"그러고 나서 어미와 아비는 지느러미로 알에 부채질을 하고, 청결을 유지하는 등 보금자리를 지키는 데 힘을 모은다.",syn:"corporate 법인의 회사의"},
{w:"deserve",pos:"v",m:"~받을 만하다, ~할 자격이 있다(merit)",phrases:["deserve the award|상을 받을 만하다","deserve to be punished|벌을 받아 마땅하다"],ex:"Mr. Jackson has raised a very good point, which <b>deserves</b> our serious attention.",ex_kr:"잭슨 씨는 아주 좋은 점을 지적했고, 그것은 우리의 진지한 관심을 끌 만하다.",syn:"conserve 보존하다 / reserve 넘겨 두다"},
{w:"dominant",pos:"a",m:"우세한, 지배적인; 우성의",phrases:["the dominant position in the group|집단 내에서의 지배적인 위치","dominant genes|우성 유전자"],ex:"Historically, like almost every culture on the planet, Japan has been a male-<b>dominant</b> society.",ex_kr:"일본은 역사적으로 지구상의 거의 모든 문화권과 같이 남성 우위의 사회이다.",syn:"domineering 오만한 독재적인"},
{w:"evolve",pos:"v",m:"진화[발전]하다",phrases:["evolve into humans|인간으로 진화하다","evolve from a hobby into a business|취미가 사업으로 발전하다"],ex:"Years ago in rural areas, the school calendar <b>evolved</b> around the agricultural life of the community.",ex_kr:"수년 전 농촌 지역에서 학교 학사 일정은 지역 사회의 농경 생활을 중심으로 서서히 발달했다.",syn:"revolve 공전하다 / devolve 양도하다"},

{w:"denote",pos:"v",m:"나타내다; 표시하다",phrases:["denote one's feelings clearly|자신의 감정을 명확히 나타내다"],ex:"Grammar involves the ways in which they order words and <b>denote</b> tense and number.",ex_kr:"문법은 단어를 배열하고 시제와 수를 표현하는 방식과 관련이 있다.",syn:"connote 내포하다 / notify 통지하다 / notice 알아차리다"},
{w:"describe",pos:"v",m:"설명하다, 묘사하다",phrases:["describe the criminal|범인에 대해 묘사하다"],ex:"To begin with, let me <b>describe</b> the progress made this year.",ex_kr:"우선, 올해의 경과를 설명하겠습니다.",syn:"subscribe 서명하다 구독 신청하다"},
{w:"interpret",pos:"v",m:"해석하다; 통역하다",phrases:["interpret one's silence as refusal|침묵을 거절로 해석하다"],ex:"Anyone who believes this poem is satirical is not <b>interpreting</b> it correctly.",ex_kr:"이 시가 풍자적이라고 생각하는 사람은 제대로 해석하고 있는 것이 아니다.",syn:"translate 번역하다 / paraphrase 바꾸어 말하다"},
{w:"emphasize",pos:"v",m:"강조하다",phrases:["emphasize the importance of safety|안전의 중요성을 강조하다","place emphasis on ~|~을 강조하다"],ex:"The issue at hand is one that has been <b>emphasized</b> in the past, both in state and in public social forums.",ex_kr:"현안은 과거에 국가와 국민 사회 포럼 양쪽 모두에서 강조된 사안이다.",syn:"empathy 감정 이입 공감"},
{w:"exaggerate",pos:"v",m:"과장하다",phrases:["exaggerate the difficulties|어려움을 과장하다"],ex:"According to a 10-year study by leading scholars, earlier claims regarding infants' quantitative skills were greatly <b>exaggerated</b>.",ex_kr:"최고 학자들이 수행한 10년간의 연구를 보면 유아의 수리 능력에 대한 이전의 주장은 굉장히 과장되어 있다.",syn:"exacerbate 악화시키다 / excavate 발굴하다"},
{w:"expound",pos:"v",m:"상세히 설명하다",phrases:["expound one's views|견해를 상세히 설명하다"],ex:"When questioned, the economist <b>expounded</b> on his theory in great detail.",ex_kr:"경제학자는 질문을 받으면 매우 상세하게 그의 이론에 대해 설명했다.",syn:"compound 혼합물"},
{w:"fathom",pos:"v",m:"헤아리다, 가늠하다",phrases:["fathom one's pain|고통을 헤아리다","fathom (out) one's intention|의도를 가늠하다"],ex:"Brian could not <b>fathom</b> why his wife enjoyed reading romance novels so much.",ex_kr:"브라이언은 아내가 왜 로맨스 소설을 그렇게 즐겨 읽는지 이해할 수 없었다.",syn:"pathos 비애감 / pathology 병리학"},
{w:"slander",pos:"n/v",m:"비방, 중상; 비방하다, 중상모략하다",phrases:["a slander on one's good reputation|명성에 대한 비방","groundless slander|근거 없는 비방"],ex:"The journalist who reported on the mayor's affair was accused of <b>slander</b>.",ex_kr:"시장의 추문에 관해 보도한 기자는 명예 훼손죄로 체포되었다.",syn:"slender 날씬한 / libel (문서에 의한) 비방"},
{w:"implication",pos:"n",m:"영향, 결과; 암시, 함축",phrases:["consider the implications of the new policy|새로운 정책의 영향들을 고려하다","by implication|함축적으로"],ex:"Please note that any political speculations should be linked to their economic <b>implications</b>.",ex_kr:"정치적인 의견은 경제적 영향과 관련된 것이어야 함을 주의하시기 바랍니다.",syn:"explicate 해명하다 / complicate 복잡하게 하다 / supplicate 간청하다"},

{w:"inquire",pos:"v",m:"묻다; 조사하다",phrases:["inquire about the schedule|스케줄에 대해 물어보다","inquire after my wife's health|아내의 안부를 묻다"],ex:"I'm calling to <b>inquire</b> about the job opening.",ex_kr:"구인에 관해 문의할 게 있어 전화했습니다.",syn:"inquest 심문 조사 / acquire 습득하다 / require 요구하다"},
{w:"dispute",pos:"n/v",m:"논쟁, 분쟁; 반박하다, 논쟁하다",phrases:["settle a dispute|분쟁을 해결하다","be beyond dispute|논란의 여지가 없다"],ex:"The River Amur forms the natural border between China and Russia, where territorial <b>disputes</b> and armed conflicts have frequently occurred.",ex_kr:"아무르 강은 중국과 러시아 사이의 자연 국경을 이루며, 이곳에서는 영토 분쟁과 무력 충돌이 빈발했다.",syn:"impute ~의 탓으로 돌리다 / repute 평판"},
{w:"interrupt",pos:"v",m:"중단시키다, 가로막다",phrases:["interrupt the conversation|대화를 중단시키다","Don't interrupt me.|내 말 가로막지 마."],ex:"I understand, sir, but he can't be <b>interrupted</b> right now.",ex_kr:"선생님, 이해는 합니다만 지금 당장은 그를 방해할 수는 없습니다.",syn:"irrupt 난입[침입]하다 / erupt 폭발하다"},
{w:"mention",pos:"v/n",m:"(간단히) 말하다, 언급하다; (간단한) 언급, 거론",phrases:["avoid any mention|언급을 피하다","Don't mention it.|별 말씀을요.","not to mention|~은 말할 것도 없고"],ex:"Morgan's loathing became so strong that his grandchildren were not even allowed to <b>mention</b> Roosevelt's name.",ex_kr:"모건의 혐오감은 너무나 심해져서 그의 손주들은 루스벨트라는 이름조차 입에 올리지 못할 정도였다.",syn:"mansion 대저택 / mentor 스승 조언자"},
{w:"wrangle",pos:"v/n",m:"말다툼하다, 언쟁하다; 언쟁, 다툼",phrases:["wrangle with one's wife|부인과 다투다","wrangle over money|돈 문제로 다투다"],ex:"The two friends <b>wrangled</b> over who would get the last slice of pizza.",ex_kr:"두 친구는 마지막 남은 피자 조각을 누가 먹느냐로 말다툼을 했다.",syn:"strangle 목 졸라 죽이다 / wriggle 꿈틀거리다"},
{w:"oral",pos:"a",m:"입의, 구강의; 말로 하는",phrases:["oral proficiency|구술 능력","an oral agreement|구두 합의","oral hygiene|구강 위생"],ex:"At about age five, your child is ready to use an <b>oral</b> thermometer.",ex_kr:"자녀가 5세 정도 되면 구강 온도계를 사용할 수 있습니다.",syn:"coral 산호의 / moral 도덕의 / orator 연설가"},
{w:"pronounce",pos:"v",m:"발음하다; 선언하다",phrases:["practice pronouncing English|영어 발음하는 것을 연습하다","pronounce her the winner|그녀를 우승자로 선언하다"],ex:"Linguist Noam Chomsky <b>pronounced</b> the concept of postmodernism meaningless.",ex_kr:"언어학자인 노암 촘스키는 포스트모더니즘의 개념이란 것은 무의미하다고 표명했다.",syn:"announce 발표하다 / renounce 포기하다 / denounce 비난하다"},
{w:"refute",pos:"v",m:"반박하다; 부인하다",phrases:["refute one's argument|주장을 반박하다"],ex:"The findings of our report <b>refute</b> the idea that there has to be a trade-off between immigration and economic progress.",ex_kr:"우리 보고서의 연구 결과는 이민과 경제 발전 사이의 균형이 있어야 한다는 생각에 반박한다.",syn:"repute 평판 / refuse 거절하다"},
{w:"respond",pos:"v",m:"대답하다, 답장하다; 반응하다",phrases:["respond to one's question|질문에 대답하다"],ex:"Please take a few minutes to <b>respond</b> to this confidential survey.",ex_kr:"몇 분 할애해서 이 비밀 설문 조사에 응해 주시기 바랍니다.",syn:"correspond 교신하다 일치하다"},
{w:"simultaneous",pos:"a",m:"동시에 일어나는",phrases:["simultaneous translation|동시통역"],ex:"The meeting will run more smoothly if <b>simultaneous</b> interpretation of Russian and English is provided.",ex_kr:"러시아어와 영어의 동시통역이 제공된다면 회의는 더 부드럽게 진행될 것이다.",syn:"spontaneous 자발적인 자연스러운"},

{w:"succinct",pos:"a",m:"간결한, 간단명료한",phrases:["a succinct answer|간결한 대답"],ex:"<b>Succinct</b> writing tends to be better received than overly wordy prose.",ex_kr:"간결한 글쓰기는 지나치게 장황한 산문보다 더 잘 받아들여지는 경향이 있다.",syn:"prolix 장황한 / wordy 장황한"},

{w:"arrogant",pos:"a",m:"거만한, 오만한",phrases:["be unbearably arrogant|참을 수 없을 정도로 거만하다","an arrogant boss|거만한 상사"],ex:"Nancy was acting a bit <b>arrogant</b> when she started bragging about her test scores.",ex_kr:"낸시는 자신의 시험 점수에 대해 떠벌리기 시작했을 때 조금 오만하게 행동했다.",syn:"derogate 깎아내리다 헐뜯다 / surrogate 대리인 대용의"},
{w:"assuage",pos:"v",m:"(안 좋은 감정을) 누그러뜨리다; 달래다",phrases:["assuage one's fear|두려움을 누그러뜨리다","assuage one's guilt|죄책감을 덜어 주다","assuage one's thirst|갈증을 달래다"],ex:"Martha tried hard to <b>assuage</b> the anger of her husband and make amends.",ex_kr:"마사는 남편의 화를 달래고 보상해 주기 위해 열심히 애썼다.",syn:"dosage 복용량 / massage 마사지"},
{w:"audacious",pos:"a",m:"대담한; 뻔뻔한",phrases:["make an audacious plan|대담한 계획을 세우다","an audacious suggestion|용감한 제안"],ex:"The <b>audacious</b> explorer set off into the wilderness with only a week's worth of food and water.",ex_kr:"그 대담한 탐험가는 일주일치의 식량과 물만 가지고 미개지로 떠났다.",syn:"tenacious 집요한 / veracious 진실한 / perspicacious 명민한"},
{w:"awesome",pos:"a",m:"굉장한, 훌륭한",phrases:["put on awesome sunglasses|멋진 선글라스를 끼다","throw an awesome party|멋진 파티를 열다"],ex:"We saw an <b>awesome</b> band play at the club last night.",ex_kr:"우린 어젯밤 클럽에서 굉장한 밴드의 연주를 봤어.",syn:"awful 끔찍한 / lawful 합법적인"},
{w:"complacent",pos:"a",m:"자기 만족적인; 무관심한",phrases:["a complacent attitude|현실에 안주하는 태도","be complacent about one's achievement|자신의 성취에 대해 안주하다"],ex:"The company's employees are too <b>complacent</b> to go on strike for higher wages.",ex_kr:"그 회사의 직원들은 임금 인상을 위해 파업을 하기에는 너무 현실에 안주하는 성향이 있다.",syn:"complaisant 남의 말을 잘 듣는"},

// ── 상태 ──
const S={selDay:null,selStep:'learn',selMode:'mc',li:0,ld:null,td:null,tm:'mc',qs:[],qi:0,sc:0,ht:3,str:0,mstr:0,cor:0,miss:[]};

function init(){
  const g=document.getElementById('day-grid');
  Object.keys(DB).forEach(d=>{
    const day=DB[d],hasData=true;
    const b=document.createElement('button');
    b.className='dbtn'+(d=='5'?' act':'');
    b.dataset.day=d;
    b.innerHTML=`<div class="dnum">Day ${d}</div><div class="dthm">${day.theme}<br>${day.theme_kr}</div><div class="dcnt">단어 ${day.words.length}개</div>`;
    b.onclick=()=>selDay(d);
    g.appendChild(b);
  });
  // 준비중 Day (7-30)
  for(let d=7;d<=30;d++){
    if(DB[d]) continue;
    const b=document.createElement('button');
    b.className='dbtn lk';
    b.innerHTML=`<div class="dnum" style="color:var(--gyll)">Day ${d}</div><div class="dthm">준비중</div>`;
    g.appendChild(b);
  }
  selDay('5'); selStep('learn'); selMode('mc');
}

function selDay(d){
  S.selDay=String(d);
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('act',b.dataset.day===String(d)));
  updHint();
}
function selStep(s){
  S.selStep=s;
  document.getElementById('tab-learn').classList.toggle('act',s==='learn');
  document.getElementById('tab-test').classList.toggle('act',s==='test');
  document.getElementById('mbts').style.opacity=s==='test'?'1':'0.4';
  document.getElementById('mbts').style.pointerEvents=s==='test'?'auto':'none';
  updHint();
}
function selMode(m){
  S.selMode=m;
  ['mc','rev','sp','mix'].forEach(id=>{
    const b=document.getElementById('m-'+id);
    b.className='btn sm'+(id===m?' tl':'');
  });
}
function updHint(){
  const h=document.getElementById('go-hint');
  if(!S.selDay){h.textContent='Day를 선택하세요';return;}
  const cnt=DB[S.selDay]?.words.length||0;
  h.textContent=S.selStep==='learn'?`Day ${S.selDay} · ${cnt}개 단어 학습`:`Day ${S.selDay} · ${cnt}개 단어 테스트`;
}
function go(){
  if(!S.selDay){ntf('Day를 선택하세요');return;}
  if(!DB[S.selDay]){ntf('아직 준비 중인 Day입니다');return;}
  if(S.selStep==='learn') startLearn(S.selDay);
  else startTest(S.selDay,S.selMode);
}

// ── LEARN ──
function startLearn(day){
  S.ld=String(day); S.li=0;
  document.getElementById('ltitle').textContent=`Day ${day} · ${DB[day].theme_kr}`;
  show('learn'); renderL();
}
function renderL(){
  const d=DB[S.ld],words=d.words,i=S.li,total=words.length,w=words[i];
  document.getElementById('lidx').textContent=`${i+1}/${total}`;
  document.getElementById('lprog').style.width=`${((i+1)/total)*100}%`;
  document.getElementById('lprogt').textContent=`${i+1}/${total}`;
  document.getElementById('pbtn').disabled=i===0;
  document.getElementById('nbtn').textContent=i===total-1?'완료 ✓':'다음 →';
  // dots
  const dc=document.getElementById('ndots');dc.innerHTML='';
  words.forEach((_,j)=>{
    const dot=document.createElement('div');
    dot.className='ndot'+(j<i?' seen':'')+(j===i?' cur':'');
    dot.onclick=()=>{S.li=j;renderL();};
    dc.appendChild(dot);
  });
  // phrases
  let ph='';
  if(w.phrases?.length){
    ph=`<div style="font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.6px;margin-top:14px;margin-bottom:6px">숙어 · 활용</div>`;
    w.phrases.forEach(p=>{const[en,kr]=p.split('|');ph+=`<div class="phr"><span class="phen">${en}</span><span class="phkr"> — ${kr}</span></div>`;});
  }
  const exH=w.ex?`<div style="font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.6px;margin-top:14px;margin-bottom:6px">기출 예문</div><div class="exbox"><div class="exen">${w.ex}</div><div class="exkr">${w.ex_kr}</div></div>`:'';
  const synH=w.syn?`<div class="vbox" style="margin-top:12px"><div style="font-size:10px;font-weight:600;color:var(--gy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">VOCA+</div>${w.syn.split(' / ').map(s=>`<div class="vi">${s.replace(/^(\S+)/,'<span class="vw">$1</span>')}</div>`).join('')}</div>`:'';
  document.getElementById('wcard').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
      <div class="ww">${w.w}</div>
      <span class="tag tg-gy">${w.pos}</span>
    </div>
    <div style="margin-bottom:12px"><span class="tag ${S.ld==='5'?'tg-bl':'tg-tl'}">Day ${S.ld}</span></div>
    <div class="wm">${w.m}</div>
    ${ph}${exH}${synH}`;
}
function lnav(dir){
  const total=DB[S.ld].words.length,next=S.li+dir;
  if(next<0) return;
  if(next>=total){ntf('🎉 Day '+S.ld+' 학습 완료!');bkHome();return;}
  S.li=next; renderL();
}
function goTst(){startTest(S.ld,S.selMode);}

// ── TEST ──
function startTest(day,mode){
  S.td=String(day);S.tm=mode||S.selMode;
  const pool=DB[day].words.map(w=>({...w,day:String(day)}));
  S.qs=shuf(pool);S.qi=0;S.sc=0;S.ht=3;S.str=0;S.mstr=0;S.cor=0;S.miss=[];
  document.getElementById('ttitle').textContent=`Day ${day} · 테스트`;
  show('test'); renderQ();
}
function renderQ(){
  if(S.qi>=S.qs.length||S.ht<=0){showRes();return;}
  const q=S.qs[S.qi],total=S.qs.length;
  document.getElementById('qcnt').textContent=`${S.qi+1}/${total}`;
  document.getElementById('qpg').style.width=`${((S.qi+1)/total)*100}%`;
  document.getElementById('sc').textContent=`${S.sc}점`;
  ['h1','h2','h3'].forEach((id,i)=>document.getElementById(id).classList.toggle('dead',i>=S.ht));
  let am=S.tm;
  if(S.tm==='mix') am=['mc','mc','rev','sp'][Math.floor(Math.random()*4)];
  S.cm=am;
  const ml={mc:'뜻 고르기',rev:'한→영',sp:'영단어 입력'};
  const dc=q.day==='5'?'tg-bl':'tg-tl';
  const sb=S.str>=2?`<span class="tag tg-am">🔥 ${S.str}연속</span>`:'';
  document.getElementById('qtags').innerHTML=`<span class="tag ${dc}">Day ${q.day}</span><span class="tag tg-gy">${q.pos}</span><span class="tag tg-gy">${ml[am]}</span>${sb}`;
  document.getElementById('fb').innerHTML='';
  document.getElementById('nxt').style.display='none';
  document.getElementById('area-mc').style.display='none';
  document.getElementById('area-sp').style.display='none';
  if(am==='mc'){
    document.getElementById('area-mc').style.display='block';
    document.getElementById('qword').textContent=q.w;
    document.getElementById('qword').style.fontSize='';
    document.getElementById('qsub').textContent=`(${q.pos})`;
    const wrong=shuf(S.qs.filter(x=>x.w!==q.w)).slice(0,3).map(x=>x.m);
    mkChoices(shuf([q.m,...wrong]),c=>{
      S.qs.slice(0,1); // dummy
      document.getElementById('mcwrap').querySelectorAll('.cho').forEach(b=>{
        b.disabled=true;
        if(b.textContent.slice(3)===q.m) b.classList.add('ok');
      });
      const isOk=c===q.m;
      if(!isOk) event.target.classList.add('ng');
      hndl(isOk,q);
    });
  } else if(am==='rev'){
    document.getElementById('area-mc').style.display='block';
    document.getElementById('qword').style.fontSize='17px';
    document.getElementById('qword').textContent=q.m;
    document.getElementById('qsub').textContent=`(${q.pos}) — 영단어를 고르세요`;
    const wrong=shuf(S.qs.filter(x=>x.w!==q.w)).slice(0,3).map(x=>x.w);
    mkChoices(shuf([q.w,...wrong]),c=>{
      document.getElementById('mcwrap').querySelectorAll('.cho').forEach(b=>{
        b.disabled=true;
        if(b.textContent.slice(3)===q.w) b.classList.add('ok');
      });
      const isOk=c===q.w;
      if(!isOk) event.target.classList.add('ng');
      hndl(isOk,q);
    });
  } else {
    document.getElementById('area-sp').style.display='block';
    document.getElementById('spmean').innerHTML=q.m;
    document.getElementById('sphint').textContent=`(${q.pos})`;
    const inp=document.getElementById('spinp');
    inp.value='';inp.disabled=false;inp.className='sinp';
    inp.onkeydown=e=>{if(e.key==='Enter')chkSp();};
    setTimeout(()=>inp.focus(),80);
  }
}
function mkChoices(choices,handler){
  const wrap=document.getElementById('mcwrap');wrap.innerHTML='';
  choices.forEach((c,i)=>{
    const b=document.createElement('button');b.className='cho';
    b.textContent=`${String.fromCharCode(65+i)}. ${c}`;
    b.onclick=function(e){
      document.getElementById('mcwrap').querySelectorAll('.cho').forEach(x=>x.disabled=true);
      handler(c);
    };
    wrap.appendChild(b);
  });
}
function chkSp(){
  const q=S.qs[S.qi],inp=document.getElementById('spinp');
  const ans=inp.value.trim().toLowerCase();
  inp.disabled=true;
  const ok=ans===q.w.toLowerCase();
  inp.classList.add(ok?'ok':'ng');
  hndl(ok,q);
}
function hndl(ok,q){
  const fb=document.getElementById('fb');
  if(ok){
    S.str++;S.cor++;if(S.str>S.mstr)S.mstr=S.str;
    const bon=S.str>=3?Math.min(S.str,5)*2:0;S.sc+=10+bon;
    const bt=bon?` (+${bon}점 보너스 🔥)`:'';
    fb.innerHTML=`<div class="fb ok">✅ 정답!${bt}<br><strong>${q.w}</strong> = ${q.m}<div class="fbex">📌 ${q.ex?q.ex.replace(/<\/?b>/g,''):''}</div></div>`;
  } else {
    S.str=0;S.ht--;S.miss.push(q.w);
    ['h1','h2','h3'].forEach((id,i)=>document.getElementById(id).classList.toggle('dead',i>=S.ht));
    fb.innerHTML=`<div class="fb ng">❌ 틀렸어요!<br>정답: <strong>${q.w}</strong> = ${q.m}<div class="fbex">📌 ${q.ex?q.ex.replace(/<\/?b>/g,''):''}</div></div>`;
  }
  document.getElementById('sc').textContent=`${S.sc}점`;
  if(S.ht<=0){setTimeout(showRes,1200);return;}
  document.getElementById('nxt').style.display='block';
}
function nextQ(){
  document.getElementById('spinp').className='sinp';
  S.qi++;renderQ();
}

// ── RESULT ──
function showRes(){
  show('result');
  const total=S.qs.length,rate=Math.round((S.cor/total)*100);
  let e='😅',t='조금 더 연습해봐요!';
  if(rate>=90){e='🏆';t='완벽해요!';}
  else if(rate>=70){e='🎉';t='잘했어요!';}
  else if(rate>=50){e='💪';t='좋아요, 계속 도전!';}
  document.getElementById('remo').textContent=e;
  document.getElementById('rtit').textContent=t;
  document.getElementById('rsub').textContent=`Day ${S.td} · ${total}문제`;
  document.getElementById('rsc').textContent=S.sc;
  document.getElementById('rrt').textContent=rate+'%';
  document.getElementById('rst').textContent=S.mstr+'🔥';
  document.getElementById('rmiss').innerHTML=S.miss.length
    ?`<div style="font-size:12px;font-weight:600;color:var(--txm);margin-bottom:6px">다시 볼 단어 (${S.miss.length}개)</div>`+S.miss.map(w=>`<span style="display:inline-block;background:var(--rdl);color:#A32D2D;border-radius:6px;padding:3px 10px;margin:3px;font-size:13px;font-weight:500">${w}</span>`).join(''):'';
}
function retry(){startTest(S.td,S.tm);}

// ── UTILS ──
function shuf(a){return[...a].sort(()=>Math.random()-.5);}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+id).classList.add('active');window.scrollTo(0,0);}
function bkHome(){show('home');}
function ntf(msg){const e=document.getElementById('notif');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}

init();
</script>
</body>
</html>
