<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW TEPS VOCA — Grace</title>
<style>
:root{
  --teal:#1D9E75;--tl:#E1F5EE;--td:#0F6E56;--tll:#9FE1CB;
  --bl:#185FA5;--bll:#E6F1FB;--blll:#B5D4F4;
  --am:#BA7517;--aml:#FAEEDA;
  --rd:#E24B4A;--rdl:#FCEBEB;
  --gy:#5F5E5A;--gyl:#F1EFE8;--gyll:#D3D1C7;
  --tx:#2C2C2A;--txm:#888780;--txh:#444441;
  --bg:#fff;--bg2:#F1EFE8;--bd:rgba(0,0,0,0.13)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efea;color:var(--tx);min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:16px}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:12px;padding:18px 20px;margin-bottom:12px}
.btn{border:.5px solid var(--bd);background:var(--bg);border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer;color:var(--tx);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--bg2)}.btn.tl{background:var(--teal);color:#fff;border-color:var(--td)}.btn.tl:hover{background:var(--td)}.btn.bl{background:var(--bll);color:var(--bl);border-color:var(--blll)}.btn.bl:hover{background:#dae9f8}.btn.full{width:100%;justify-content:center;padding:13px;font-size:15px;font-weight:600}.btn.sm{padding:6px 12px;font-size:13px}.btn:disabled{opacity:.4;cursor:default}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
.tg-tl{background:var(--tl);color:var(--td)}.tg-bl{background:var(--bll);color:var(--bl)}.tg-am{background:var(--aml);color:var(--am)}.tg-gy{background:var(--gyl);color:var(--gy)}
.screen{display:none}.screen.active{display:block}
/* HOME */
.hdr{text-align:center;padding:22px 0 14px}
.hdr h1{font-size:24px;font-weight:700}.hdr p{font-size:13px;color:var(--txm);margin-top:3px}
.sec{font-size:12px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.dgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.dbtn{border:.5px solid var(--bd);background:var(--bg2);border-radius:10px;padding:10px 4px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;color:var(--txh);transition:all .15s;font-family:inherit;line-height:1.4}
.dbtn:hover{background:var(--tl);border-color:var(--tll)}.dbtn.sel{background:var(--teal);color:#fff;border-color:var(--td)}.dbtn.lk{opacity:.35;cursor:default}
.stabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stab{border:.5px solid var(--bd);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;background:var(--bg)}
.stab:hover{background:var(--bg2)}.stab.act{border-color:var(--tll);background:var(--tl)}
.stic{font-size:20px;margin-bottom:4px}.sttl{font-size:13px;font-weight:600}.stds{font-size:11px;color:var(--txm);margin-top:2px}
/* LEARN */
.wcard{background:var(--bg);border:.5px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:12px}
.whead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.wtop{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.wword{font-size:28px;font-weight:700;letter-spacing:-.5px}
.wpos{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bll);color:var(--bl);font-weight:600}
.wpron{font-size:13px;color:var(--txm);margin-top:2px}
.wmean{font-size:17px;font-weight:600;color:var(--tx);margin:10px 0 4px}

/* 🔊 TTS 버튼 */
.tts-btn{border:none;background:var(--tl);border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:var(--td)}
.tts-btn:hover{background:var(--tll);transform:scale(1.08)}
.tts-btn.speaking{background:var(--teal);color:#fff;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
/* TTS 진행 표시 */
.tts-seq{display:flex;gap:6px;align-items:center;margin:8px 0 0;font-size:11px;color:var(--txm)}
.tts-dot{width:7px;height:7px;border-radius:50%;background:var(--gyll);transition:all .3s}
.tts-dot.active{background:var(--teal);transform:scale(1.3)}
.tts-dot.done{background:var(--tll)}

.wdiv{border-top:.5px solid var(--bd);margin:12px 0}
.wsec{font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.phrases{display:flex;flex-direction:column;gap:4px}
.phrase{font-size:13px;color:var(--txh)}
.phrase strong{color:var(--bl)}
.exbox{background:var(--bll);border-radius:8px;padding:10px 12px}
.exen{font-size:13px;line-height:1.6;color:var(--tx)}
.exen b{color:var(--bl);font-weight:700}
.exko{font-size:12px;color:var(--txm);margin-top:3px;line-height:1.5}
.synbox{font-size:12px;color:var(--gy);background:var(--gyl);border-radius:6px;padding:7px 10px;line-height:1.6}
.prog{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.progb{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
.navrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
/* TEST */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.sbox{background:var(--bg2);border-radius:8px;padding:8px;text-align:center}
.sl{font-size:11px;color:var(--txm);margin-bottom:2px}.sv{font-size:18px;font-weight:700}
.qcard{background:var(--bg);border:.5px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:12px}
.qw{font-size:22px;font-weight:700;margin-bottom:8px;line-height:1.3}.qw.sp-word{cursor:pointer;display:inline-flex;align-items:center;gap:8px;border-radius:8px;padding:2px 6px;transition:background .15s}.qw.sp-word:hover{background:var(--tl)}.tts-q-btn{font-size:15px;background:none;border:none;cursor:pointer;opacity:.55;transition:opacity .2s;padding:0}.qw.sp-word:hover .tts-q-btn{opacity:1}
.qs{font-size:13px;color:var(--txm);margin-bottom:14px}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc-opt{border:.5px solid var(--bd);background:var(--bg);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;color:var(--tx);width:100%}
.mc-opt:hover{background:var(--bg2)}.mc-opt.ok{background:var(--tl);border-color:var(--tll);color:var(--td)}.mc-opt.ng{background:var(--rdl);border-color:#f5c6c6;color:var(--rd)}.mc-opt:disabled{cursor:default}
.sinp{width:100%;border:.5px solid var(--bd);border-radius:8px;padding:12px;font-size:16px;font-family:inherit;color:var(--tx);background:var(--bg);margin-top:10px}
.sinp:focus{outline:none;border-color:var(--tll)}
.fb-ok{background:var(--tl);border:.5px solid var(--tll);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:13px;color:var(--td)}
.fb-ng{background:var(--rdl);border:.5px solid #f5c6c6;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:13px;color:var(--rd)}
.witem{padding:6px 0;border-bottom:.5px solid var(--bd);font-size:13px}
.witem:last-child{border-bottom:none}
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.notif.show{opacity:1}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->

      </div>
      <div class="stab" id="tab-test" onclick="selStep('test')">

<div id="s-result" class="screen">

  <div class="card" style="text-align:center">

    <div style="font-size:22px;font-weight:700;margin-bottom:6px" id="r-score"></div>

  </div>

  <button class="btn tl full" onclick="toHome()">홈으로</button>

</div>

<script>
// ══════════════════════════════════════════════════
//  TTS ENGINE
// ══════════════════════════════════════════════════
const TTS = {
  synth: window.speechSynthesis,
  speaking: false,
  queue: [],
  currentBtn: null,
  seqDots: null,
  seqIdx: 0,

  stop() {
    this.synth.cancel();
    this.speaking = false;
    this.queue = [];
    if (this.currentBtn) {
      this.currentBtn.classList.remove('speaking');
      this.currentBtn.textContent = '🔊';
    }
    this.currentBtn = null;
    if (this.seqDots) {
      this.seqDots.forEach(d => { d.classList.remove('active','done'); });
    }
  },

  speak(texts, btn, dots) {
    // texts: [{text, lang}]  순서대로 읽기
    this.stop();
    this.currentBtn = btn;
    this.seqDots = dots;
    this.seqIdx = 0;
    this.queue = [...texts];
    this.speaking = true;
    if (btn) { btn.classList.add('speaking'); btn.textContent = '⏹'; }
    this._next();
  },

  _next() {
    if (!this.speaking || this.queue.length === 0) {
      this.speaking = false;
      if (this.currentBtn) {
        this.currentBtn.classList.remove('speaking');
        this.currentBtn.textContent = '🔊';
      }
      if (this.seqDots) {
        this.seqDots.forEach(d => d.classList.add('done'));
      }
      return;
    }
    const item = this.queue.shift();
    const utter = new SpeechSynthesisUtterance(item.text);
    utter.lang = item.lang || 'en-US';
    utter.rate = item.rate || 0.9;
    utter.pitch = 1.0;

    // dot 표시
    if (this.seqDots && this.seqDots[this.seqIdx]) {
      if (this.seqIdx > 0) this.seqDots[this.seqIdx-1].classList.replace('active','done');
      this.seqDots[this.seqIdx].classList.add('active');
    }
    this.seqIdx++;

    utter.onend = () => { setTimeout(() => this._next(), 300); };
    utter.onerror = () => { this._next(); };
    this.synth.speak(utter);
  }
};

// 단어 카드에서 TTS 실행: 단어 → 예문 → 구문(phrase) 순
// 단어 발음만 읽기 (테스트 화면용)
function speakWordOnly(word) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  window.speechSynthesis.speak(utter);
}

function speakWord(w, btn, dotsEl) {
  // 진행 중이면 중지
  if (TTS.speaking) { TTS.stop(); return; }

  const dots = dotsEl ? Array.from(dotsEl.querySelectorAll('.tts-dot')) : null;
  const texts = [];

  // 1. 단어 (영어, 느리게)
  texts.push({ text: w.w, lang: 'en-US', rate: 0.85 });

  // 2. 뜻 (한국어)
  const cleanMean = w.m.replace(/[;:,]/g, ' ').trim();
  texts.push({ text: cleanMean, lang: 'ko-KR', rate: 1.0 });

  // 3. 예문 (영어, 볼드 제거)
  if (w.ex) {
    const cleanEx = w.ex.replace(/<[^>]+>/g, '');
    texts.push({ text: cleanEx, lang: 'en-US', rate: 0.85 });
  }

  // 4. 첫 번째 구문 (영어 부분만)
  if (w.phrases && w.phrases.length > 0) {
    const ph = w.phrases[0];
    const phEn = (typeof ph === 'string' ? ph.split('|')[0] : ph).trim();
    texts.push({ text: phEn, lang: 'en-US', rate: 0.85 });
  }

  TTS.speak(texts, btn, dots);
}

// ══════════════════════════════════════════════════
//  WORD DATABASE  (Day 1~6 완성 / Day 7~30 준비 중)
// ══════════════════════════════════════════════════
const DB={
1:{theme:"Human Beings",theme_kr:"인간",words:[
{w:"yearn",pos:"v",m:"갈망하다",phrases:["secretly yearn|몰래 갈망하다","yearn for freedom|자유를 갈망하다"],ex:"Becoming an actor was the one thing Stuart desired, the thing he <b>yearned</b> most to achieve.",ex_kr:"배우가 되는 것은 스튜어트가 소망했던 그것, 가장 성취하기를 바랐던 것이었다.",syn:"long 갈망하다"},

{w:"tolerate",pos:"v",m:"참다",phrases:["find something difficult to tolerate|참기 힘들다고 여기다"],ex:"I can't <b>tolerate</b> Donnie constantly being late.",ex_kr:"나는 도니가 끊임없이 지각하는 걸 참을 수가 없어.",syn:"endure 참다 / condone 용납하다"},
{w:"native",pos:"n/a",m:"출신자; 토착의",phrases:["native speakers of English|영어 원어민"],ex:"Jack is a California <b>native</b>.",ex_kr:"잭은 캘리포니아 출신이다.",syn:"indigenous 토착의 원산의"},
{w:"console",pos:"v",m:"위로하다",phrases:["console oneself|위안을 삼다"],ex:"I've attempted to <b>console</b> Jane several times.",ex_kr:"내가 제인을 몇 번 위로를 하려고 했어.",syn:"assuage 달래다"},
{w:"individual",pos:"a/n",m:"각각의, 개개의",phrases:["individual freedom|개인의 자유"],ex:"The board assesses each proposal on an <b>individual</b> basis before making a decision.",ex_kr:"이사회는 결정을 하기 전에 각 제안서를 개별적으로 평가한다.",syn:"unique 독특한"},
{w:"negative",pos:"a",m:"부정적인",phrases:["negative about an idea|어떤 생각에 대해 부정적인"],ex:"The word 'amateur' carries <b>negative</b> connotations for many people.",ex_kr:"'아마추어'라는 말은 많은 사람들에게 부정적인 의미를 내포한다.",syn:"positive 긍정적인 / pessimistic 비관적인 / optimistic 낙관적인"},
{w:"complain",pos:"v",m:"불평하다",phrases:["complain of stomachaches|복통을 호소하다"],ex:"The mother gave her kids equal amounts of cake so that no one could <b>complain</b>.",ex_kr:"엄마는 아이들에게 동일한 양의 케이크를 줘서 아무도 불평할 수 없었다.",syn:"compliment 칭찬하다 / approve 찬성하다"},
{w:"adjust",pos:"v",m:"적응하다; 조정[조절]하다",phrases:["adjust to the new school|새 학교에 적응하다","adjust a car seat|자동차의 좌석을 조절하다","adjust his tie|넥타이를 고쳐 매다"],ex:"They also need time to <b>adjust</b> to life in a post-parenting marriage.",ex_kr:"그들은 또한 육아 이후의 결혼 생활에 적응할 시간이 필요하다.",syn:"justice 정의 재판 / justify 합리화하다"},

{w:"communicate",pos:"v",m:"의사소통을 하다; 전달하다; 전염시키다",phrases:["communicate by e-mail|이메일로 연락을 주고받다"],ex:"They <b>communicate</b> with a special kind of language — a chemical language.",ex_kr:"그들은 화학적인 언어와 같은 특별한 대화로 의사소통을 한다.",syn:"community 지역 사회 / commute 통근하다"},
{w:"consent",pos:"n/v",m:"동의, 허락; 동의하다, 찬성하다",phrases:["ask for prior consent|사전 동의를 구하다","the age of consent|법적 연령"],ex:"Advertisers often collect user information without user <b>consent</b>.",ex_kr:"광고 업체들은 종종 사용자의 동의 없이 사용자 정보를 수집한다.",syn:"consensus 일치 합의 여론"},
{w:"controversial",pos:"a",m:"논란이 많은",phrases:["a highly controversial issue|대단히 논란이 되는 이슈"],ex:"The most <b>controversial</b> disputes were over this deceptively simple question: What was Christopher Columbus really like?",ex_kr:"가장 논란이 되었던 논쟁은 '크리스토퍼 콜럼버스가 정말 어떤 사람이었는가'에 대한 단순한 질문을 놓고 벌어졌다.",syn:"controversy 논란"},
{w:"convey",pos:"v",m:"(사상·견해 등을) 전달하다; 운반하다",phrases:["convey the good news|쾌보를 전달하다"],ex:"Though the chief producer clearly sees the message you are trying to <b>convey</b>, he feels that there is something missing.",ex_kr:"제작 책임자는 귀하가 전달하고자 하는 메시지가 무엇인지 분명히 알겠지만 뭔가 빠진 것이 있다고 느끼고 있습니다.",syn:"convoy 호위하다 / survey 설문 조사"},
{w:"denote",pos:"v",m:"나타내다; 표시하다",phrases:["denote one's feelings clearly|자신의 감정을 명확히 나타내다"],ex:"Grammar involves the ways in which they order words and <b>denote</b> tense and number.",ex_kr:"문법은 단어를 배열하고 시제와 수를 표현하는 방식과 관련이 있다.",syn:"connote 내포하다 / notify 통지하다 / notice 알아차리다"},
{w:"describe",pos:"v",m:"설명하다, 묘사하다",phrases:["describe the criminal|범인에 대해 묘사하다"],ex:"To begin with, let me <b>describe</b> the progress made this year.",ex_kr:"우선, 올해의 경과를 설명하겠습니다.",syn:"subscribe 서명하다 구독 신청하다"},
{w:"interpret",pos:"v",m:"해석하다; 통역하다",phrases:["interpret one's silence as refusal|침묵을 거절로 해석하다"],ex:"Anyone who believes this poem is satirical is not <b>interpreting</b> it correctly.",ex_kr:"이 시가 풍자적이라고 생각하는 사람은 제대로 해석하고 있는 것이 아니다.",syn:"translate 번역하다 / paraphrase 바꾸어 말하다"},
{w:"emphasize",pos:"v",m:"강조하다",phrases:["emphasize the importance of safety|안전의 중요성을 강조하다","place emphasis on ~|~을 강조하다"],ex:"The issue at hand is one that has been <b>emphasized</b> in the past, both in state and in public social forums.",ex_kr:"현안은 과거에 국가와 국민 사회 포럼 양쪽 모두에서 강조된 사안이다.",syn:"empathy 감정 이입 공감"},
{w:"exaggerate",pos:"v",m:"과장하다",phrases:["exaggerate the difficulties|어려움을 과장하다"],ex:"According to a 10-year study by leading scholars, earlier claims regarding infants' quantitative skills were greatly <b>exaggerated</b>.",ex_kr:"최고 학자들이 수행한 10년간의 연구를 보면 유아의 수리 능력에 대한 이전의 주장은 굉장히 과장되어 있다.",syn:"exacerbate 악화시키다 / excavate 발굴하다"},
{w:"expound",pos:"v",m:"상세히 설명하다",phrases:["expound one's views|견해를 상세히 설명하다"],ex:"When questioned, the economist <b>expounded</b> on his theory in great detail.",ex_kr:"경제학자는 질문을 받으면 매우 상세하게 그의 이론에 대해 설명했다.",syn:"compound 혼합물"},
{w:"fathom",pos:"v",m:"헤아리다, 가늠하다",phrases:["fathom one's pain|고통을 헤아리다","fathom (out) one's intention|의도를 가늠하다"],ex:"Brian could not <b>fathom</b> why his wife enjoyed reading romance novels so much.",ex_kr:"브라이언은 아내가 왜 로맨스 소설을 그렇게 즐겨 읽는지 이해할 수 없었다.",syn:"pathos 비애감 / pathology 병리학"},
{w:"slander",pos:"n/v",m:"비방, 중상; 비방하다, 중상모략하다",phrases:["a slander on one's good reputation|명성에 대한 비방","groundless slander|근거 없는 비방"],ex:"The journalist who reported on the mayor's affair was accused of <b>slander</b>.",ex_kr:"시장의 추문에 관해 보도한 기자는 명예 훼손죄로 체포되었다.",syn:"slender 날씬한 / libel (문서에 의한) 비방"},
{w:"implication",pos:"n",m:"영향, 결과; 암시, 함축",phrases:["consider the implications of the new policy|새로운 정책의 영향들을 고려하다","by implication|함축적으로"],ex:"Please note that any political speculations should be linked to their economic <b>implications</b>.",ex_kr:"정치적인 의견은 경제적 영향과 관련된 것이어야 함을 주의하시기 바랍니다.",syn:"explicate 해명하다 / complicate 복잡하게 하다 / supplicate 간청하다"},
{w:"inarticulate",pos:"a",m:"불분명한, (발음이) 또렷하지 않은",phrases:["an inarticulate reply|불분명한 대답"],ex:"Granted they were shy and <b>inarticulate</b>, but so was my son.",ex_kr:"그들이 수줍음이 많고 말을 또렷하게 못한다 하더라도, 그것은 내 아들도 마찬가지였다.",syn:"articulate 또렷하게 발음하다"},
{w:"inquire",pos:"v",m:"묻다; 조사하다",phrases:["inquire about the schedule|스케줄에 대해 물어보다","inquire after my wife's health|아내의 안부를 묻다"],ex:"I'm calling to <b>inquire</b> about the job opening.",ex_kr:"구인에 관해 문의할 게 있어 전화했습니다.",syn:"inquest 심문 조사 / acquire 습득하다 / require 요구하다"},
{w:"dispute",pos:"n/v",m:"논쟁, 분쟁; 반박하다, 논쟁하다",phrases:["settle a dispute|분쟁을 해결하다","be beyond dispute|논란의 여지가 없다"],ex:"The River Amur forms the natural border between China and Russia, where territorial <b>disputes</b> and armed conflicts have frequently occurred.",ex_kr:"아무르 강은 중국과 러시아 사이의 자연 국경을 이루며, 이곳에서는 영토 분쟁과 무력 충돌이 빈발했다.",syn:"impute ~의 탓으로 돌리다 / repute 평판"},
{w:"interrupt",pos:"v",m:"중단시키다, 가로막다",phrases:["interrupt the conversation|대화를 중단시키다","Don't interrupt me.|내 말 가로막지 마."],ex:"I understand, sir, but he can't be <b>interrupted</b> right now.",ex_kr:"선생님, 이해는 합니다만 지금 당장은 그를 방해할 수는 없습니다.",syn:"irrupt 난입[침입]하다 / erupt 폭발하다"},
{w:"mention",pos:"v/n",m:"(간단히) 말하다, 언급하다; (간단한) 언급, 거론",phrases:["avoid any mention|언급을 피하다","Don't mention it.|별 말씀을요.","not to mention|~은 말할 것도 없고"],ex:"Morgan's loathing became so strong that his grandchildren were not even allowed to <b>mention</b> Roosevelt's name.",ex_kr:"모건의 혐오감은 너무나 심해져서 그의 손주들은 루스벨트라는 이름조차 입에 올리지 못할 정도였다.",syn:"mansion 대저택 / mentor 스승 조언자"},
{w:"wrangle",pos:"v/n",m:"말다툼하다, 언쟁하다; 언쟁, 다툼",phrases:["wrangle with one's wife|부인과 다투다","wrangle over money|돈 문제로 다투다"],ex:"The two friends <b>wrangled</b> over who would get the last slice of pizza.",ex_kr:"두 친구는 마지막 남은 피자 조각을 누가 먹느냐로 말다툼을 했다.",syn:"strangle 목 졸라 죽이다 / wriggle 꿈틀거리다"},
{w:"oral",pos:"a",m:"입의, 구강의; 말로 하는",phrases:["oral proficiency|구술 능력","an oral agreement|구두 합의","oral hygiene|구강 위생"],ex:"At about age five, your child is ready to use an <b>oral</b> thermometer.",ex_kr:"자녀가 5세 정도 되면 구강 온도계를 사용할 수 있습니다.",syn:"coral 산호의 / moral 도덕의 / orator 연설가"},
{w:"pronounce",pos:"v",m:"발음하다; 선언하다",phrases:["practice pronouncing English|영어 발음하는 것을 연습하다","pronounce her the winner|그녀를 우승자로 선언하다"],ex:"Linguist Noam Chomsky <b>pronounced</b> the concept of postmodernism meaningless.",ex_kr:"언어학자인 노암 촘스키는 포스트모더니즘의 개념이란 것은 무의미하다고 표명했다.",syn:"announce 발표하다 / renounce 포기하다 / denounce 비난하다"},
{w:"refute",pos:"v",m:"반박하다; 부인하다",phrases:["refute one's argument|주장을 반박하다"],ex:"The findings of our report <b>refute</b> the idea that there has to be a trade-off between immigration and economic progress.",ex_kr:"우리 보고서의 연구 결과는 이민과 경제 발전 사이의 균형이 있어야 한다는 생각에 반박한다.",syn:"repute 평판 / refuse 거절하다"},
{w:"respond",pos:"v",m:"대답하다, 답장하다; 반응하다",phrases:["respond to one's question|질문에 대답하다"],ex:"Please take a few minutes to <b>respond</b> to this confidential survey.",ex_kr:"몇 분 할애해서 이 비밀 설문 조사에 응해 주시기 바랍니다.",syn:"correspond 교신하다 일치하다"},
{w:"simultaneous",pos:"a",m:"동시에 일어나는",phrases:["simultaneous translation|동시통역"],ex:"The meeting will run more smoothly if <b>simultaneous</b> interpretation of Russian and English is provided.",ex_kr:"러시아어와 영어의 동시통역이 제공된다면 회의는 더 부드럽게 진행될 것이다.",syn:"spontaneous 자발적인 자연스러운"},
{w:"gist",pos:"n",m:"요지, 골자",phrases:["the gist of one's argument|주장의 요지","get the gist of|~의 요점을 파악하다"],ex:"The <b>gist</b> of the report is that poverty in the region is decreasing.",ex_kr:"보고서의 요지는 그 지역의 빈곤이 줄어들고 있다는 것이다.",syn:"fist 주먹 / mist (옅은) 안개"},
{w:"succinct",pos:"a",m:"간결한, 간단명료한",phrases:["a succinct answer|간결한 대답"],ex:"<b>Succinct</b> writing tends to be better received than overly wordy prose.",ex_kr:"간결한 글쓰기는 지나치게 장황한 산문보다 더 잘 받아들여지는 경향이 있다.",syn:"prolix 장황한 / wordy 장황한"},
{w:"trenchant",pos:"a",m:"신랄한, 예리한",phrases:["a trenchant analysis|예리한 분석"],ex:"The spokesperson could not come up with a reply to the customer's <b>trenchant</b> criticism.",ex_kr:"대변인은 고객의 예리한 비판에 대해 답변을 낼 수 없었다.",syn:"enchant 매혹하다 / penchant 경향 강한 기호"},
{w:"unctuous",pos:"a",m:"(말·행동이) 번지르르한, (사람이) 느끼한",phrases:["an unctuous manner|번지르르한 태도"],ex:"The speaker's <b>unctuous</b> tone caused many in the audience to walk out of the theater.",ex_kr:"말하는 사람의 번지르르한 말투 때문에 객석의 많은 사람들이 극장을 나갔다.",syn:"impetuous 충동적인 / sumptuous 사치스러운"},
{w:"verbose",pos:"a",m:"말이 많은, 장황한",phrases:["a verbose writing style|장황한 문체"],ex:"The more <b>verbose</b> an e-mail, the less likely the recipient is to read it.",ex_kr:"이메일이 장황할수록 받는 사람은 덜 읽고 싶어진다.",syn:"verbal 언어의 말의"},
{w:"mordant",pos:"a",m:"신랄한, 통렬한",phrases:["a mordant remark|신랄한 말","mordant satire|신랄한 풍자[유머]"],ex:"No politician wanted to be the punchline of the comedian's <b>mordant</b> jokes.",ex_kr:"어떤 정치인도 그 코미디언이 하는 신랄한 농담의 주안공이 되고 싶지 않았다.",syn:"remorse 참회 가책"}

6:{theme:"Emotions",theme_kr:"감정",words:[

{w:"annoying",pos:"a",m:"짜증 나게 하는",phrases:["the annoying noise|짜증 나는 소리","annoyed|짜증이 나 있는 심리 상태"],ex:"A plague of gnats in the summer months can be very <b>annoying</b>.",ex_kr:"여름철 각다귀들이 들려오면 매우 성가실 수 있다.",syn:"allay 가라앉히다 / alloy 합금"},
{w:"appreciate",pos:"v",m:"~을 고맙게 여기다; 진가를 알다, 감상하다; 값이 오르다",phrases:["appreciate another's help|남의 도움을 고맙게 여기다","like to appreciate movies|영화 감상을 좋아하다"],ex:"I really <b>appreciate</b> your coming over tonight.",ex_kr:"오늘 저녁 방문해 주셔서 진심으로 감사드립니다.",syn:"depreciate 경시하다 값이 하락하다 / deprecate 반대하다 비난하다"},
{w:"arrogant",pos:"a",m:"거만한, 오만한",phrases:["be unbearably arrogant|참을 수 없을 정도로 거만하다","an arrogant boss|거만한 상사"],ex:"Nancy was acting a bit <b>arrogant</b> when she started bragging about her test scores.",ex_kr:"낸시는 자신의 시험 점수에 대해 떠벌리기 시작했을 때 조금 오만하게 행동했다.",syn:"derogate 깎아내리다 헐뜯다 / surrogate 대리인 대용의"},

{w:"audacious",pos:"a",m:"대담한; 뻔뻔한",phrases:["make an audacious plan|대담한 계획을 세우다","an audacious suggestion|용감한 제안"],ex:"The <b>audacious</b> explorer set off into the wilderness with only a week's worth of food and water.",ex_kr:"그 대담한 탐험가는 일주일치의 식량과 물만 가지고 미개지로 떠났다.",syn:"tenacious 집요한 / veracious 진실한 / perspicacious 명민한"},
{w:"awesome",pos:"a",m:"굉장한, 훌륭한",phrases:["put on awesome sunglasses|멋진 선글라스를 끼다","throw an awesome party|멋진 파티를 열다"],ex:"We saw an <b>awesome</b> band play at the club last night.",ex_kr:"우린 어젯밤 클럽에서 굉장한 밴드의 연주를 봤어.",syn:"awful 끔찍한 / lawful 합법적인"},

{w:"compliment",pos:"n",m:"칭찬, 찬사",phrases:["receive a compliment|찬사를 받다","return the compliment|받은 칭찬에 대해 답례하다"],ex:"I hope that's a <b>compliment</b>.",ex_kr:"칭찬이길 바랍니다.",syn:"complement 보완물 / supplement 추가 보충하다"},

{w:"depressed",pos:"a",m:"우울한; 불경기의",phrases:["in a depressed mood|우울한 기분으로","the depressed economy|침체된 경제","Great Depression|(1930년대 미국) 대공황"],ex:"I got an F in biology. I'm so <b>depressed</b>.",ex_kr:"생물학에서 F를 받았어. 기분이 아주 울적해.",syn:"suppress 진압하다 억제하다 / oppress 억압하다 / repress 진압하다"},
{w:"consolation",pos:"n",m:"위로, 위안",phrases:["find consolation in music|음악에서 위안을 찾다","offer a few words of consolation|몇 마디 위로의 말을 해 주다"],ex:"As a <b>consolation</b> prize, runners-up will receive a new stainless steel toaster.",ex_kr:"위로상으로 차점자들은 스테인리스로 만든 빵 굽는 기구를 받을 것이다.",syn:"condolence 조문 애도 / consolidation 통합 합병"},
{w:"exuberant",pos:"a",m:"활기(열의)가 넘치는; 원기 왕성한",phrases:["young and exuberant girls|젊고 활기 넘치는 아가씨들","give an exuberant performance|활기 넘치는 공연을 하다"],ex:"Ms. Dandridge is the only <b>exuberant</b> server among the otherwise dull waitstaff.",ex_kr:"댄드릿지 양은 다른 무던 종업원들 사이에서 유일하게 활력이 넘치는 웨이트리스이다.",syn:"exude 스며 나오다 / exultant 기뻐 날뛰는"},

{w:"frantic",pos:"a",m:"제정신이 아닌; 정신없는",phrases:["be frantic with fear|두려움으로 제 정신이 아니다","make a frantic effort|미친 듯이 노력하다"],ex:"The parents were <b>frantic</b> when they found out their son was missing.",ex_kr:"아들이 실종되었다는 사실을 알게 되자 그 부모들은 제정신이 아니었다.",syn:"antic 익살 장난"},

{w:"frivolous",pos:"a",m:"경솔한, 어리석은; 사소한, 하찮은",phrases:["one's frivolous behavior|경솔한 행동","a frivolous conversation|쓸데없는 대화","a frivolous lawsuit|사소한 소송"],ex:"Work time is too valuable to waste on <b>frivolous</b> games.",ex_kr:"근무 시간은 시시한 게임으로 써 버리기에는 너무나 귀중한 시간이다.",syn:"scrupulous 꼼꼼한 양심적인"},

{w:"grim",pos:"a",m:"암울한; 엄한, 비장한",phrases:["the grim prospect|암울한 전망","a grim face|진지한 얼굴","with grim determination|비장한 각오로"],ex:"The atmosphere in the office was <b>grim</b> following news of the layoffs.",ex_kr:"해고 소식에 사무실의 분위기가 침울해졌다.",syn:"grimy 더러운 때 묻은 / grimace 얼굴을 찡그리다"},

{w:"hospitable",pos:"a",m:"환대하는, 친절한; (환경이) 쾌적한, 알맞은",phrases:["be hospitable to the guests|손님들에게 친절하다"],ex:"The people here are so friendly and welcoming; they're very <b>hospitable</b>.",ex_kr:"여기 사람들은 아주 친절하고 반갑게 맞아줘요. 굉장히 호의적이에요.",syn:"welcoming 환대하는 친절한"},
{w:"hostile",pos:"a",m:"적대적인",phrases:["get a hostile reception|적대적인 반응을 받다","a hostile country|적대국"],ex:"Most people are born with the capacity for cooperation and love as well as the capacity for aggressive and <b>hostile</b> behavior.",ex_kr:"대부분의 사람들은 공격적이고 악의적인 행동 능력뿐만 아니라 협동과 사랑의 능력 또한 가지고 태어난다.",syn:"unsympathetic 인정이 없는"},
{w:"intimidate",pos:"v",m:"위협(협박)하다",phrases:["intimidate one another by growling|으르렁거리며 상대를 위협하다","intimidate one's opponents with threats|협박으로 적들을 위협하다"],ex:"The dog's bark is meant to <b>intimidate</b> strangers entering its territory.",ex_kr:"개가 짖는 것은 자신의 영역에 침범한 낯선 사람을 위협하기 위한 것이다.",syn:"intimate 친밀한 암시하다"},

{w:"melancholy",pos:"n",m:"우울감, 비애",phrases:["a mood of melancholy|우울한 기분","suffer from melancholy|우울한 감정에 시달리다"],ex:"Some poets are best at dealing with upbeat themes, while others seem to prefer more <b>melancholy</b> subjects.",ex_kr:"어떤 시인들은 낙관적인 주제를 가장 잘 다루는 반면, 어떤 시인들은 좀 더 구슬픈 주제를 선호하는 것 같다.",syn:"E. coli 대장균"},
{w:"nostalgia",pos:"n",m:"향수",phrases:["a wave of nostalgia for one's hometown|확 밀려드는 고향에 대한 향수","feel nostalgia for one's schooldays|학창 시절에 대한 향수를 느끼다"],ex:"Songs from the 1990s fill me with <b>nostalgia</b> because they remind me of my childhood.",ex_kr:"1990년대 음악은 내 어린 시절이 생각나서 향수에 젖게 해 준다.",syn:"nostril 콧구멍 / nostrum 특효약 묘책"},

{w:"pessimistic",pos:"a",m:"비관적인",phrases:["a pessimistic view|비관적인 견해","be deeply pessimistic about the future|미래에 대해 매우 비관적이다"],ex:"Others are <b>pessimistic</b>, as they witness speakers of these endangered languages abandoning their native tongues in favor of English.",ex_kr:"다른 사람들은 사멸 위기에 처한 언어를 구사하는 사람들이 영어를 선호하여 자신들의 모국어를 저버리는 것을 보며 비관적인 입장을 취한다.",syn:"gloomy 희망이 없는"},
{w:"pretentious",pos:"a",m:"허세 부리는, 가식적인",phrases:["deliver a pretentious speech|허세 부리는 연설을 하다","a pretentious and boring film|젠체하고 지루한 영화"],ex:"Joseph has been saying some <b>pretentious</b> things ever since he was awarded the promotion.",ex_kr:"조셉은 승진을 한 후로 약간 건방진 말들을 하고 다닌다.",syn:"contentious 논쟁의 소지가 있는 / tentative 잠정적인"},

{w:"sympathy",pos:"n",m:"동정심, 연민; 공감",phrases:["a sympathy vote|동정표","express sympathy for|~에게 연민을 표하다"],ex:"Friends and family gathered here today, I would like to express my sympathies to you on behalf of the Solomon Foundation.",ex_kr:"솔로몬 재단을 대신해 오늘 이 자리에 모인 친구와 가족들 여러분께 애도의 말씀을 전합니다.",syn:"apathy 무관심 냉담 / antipathy 반감 혐오"},

  {w:"bargain",p:"/ˈbɑːrɡɪn/",m:"(정가보다) 싸게 파는 물건; 협상하다",phrases:["bargain hunters (싸고 질 좋은 물건을 찾아다니는 사람들)","strike a bargain (합의에 도달하다)"],examples:[{en:"Our special price is $40 cheaper than normal, so don't miss this great bargain.",ko:"정가보다 40달러 싼 특별가에 모십니다. 그러니 이번 대 바겐 세일을 놓치지 마세요."}],syn:["deal","steal","negotiate"]},
  {w:"bid",p:"/bɪd/",m:"값을 부르다[제시하다], 입찰하다; 입찰 (가격)",phrases:["bid $20,000 for the painting (그 그림에 대해 2만 달러를 제시하다)","make a bid for (∼에 입찰하다)"],examples:[{en:"Do you really think someone will bid that high?",ko:"누군가가 정말 그렇게 높은 가격을 부를 거라고 생각하세요?"}],syn:["offer","tender","propose"]},
  {w:"brochure",p:"/broʊˈʃʊər/",m:"안내 책자, 브로슈어",phrases:["hand out a travel brochure (여행안내 책자를 나누어 주다)"],examples:[{en:"I have a few brochures. What do you want to see most?",ko:"나한테 팸플릿 좀 있는데, 어디를 제일 보고 싶니?"}],syn:["pamphlet","leaflet","flier"]},
  {w:"browse",p:"/braʊz/",m:"둘러보다, 훑어보다",phrases:["browse in the bookstore (서점에서 이것저것 둘러보다)","browse the Internet (인터넷을 검색하다)"],examples:[{en:"Keep browsing until you find a style of jacket that you like.",ko:"마음에 드는 스타일의 재킷을 찾을 때까지 둘러보세요."}],syn:["look around","scan","explore"]},
  {w:"charge",p:"/tʃɑːrdʒ/",m:"요금; 혐의, 고발; (요금을) 청구하다",phrases:["free of charge (무료인)","be in charge of (∼을 책임지다[맡다])"],examples:[{en:"There's no extra charge for vegetarian meals on the flight.",ko:"기내에서 채식주의자용 식사에 대한 추가 비용은 없습니다."}],syn:["fee","cost","accuse"]},
  {w:"clientele",p:"/ˌklaɪənˈtel/",m:"(어떤 기관·상점 등의) 모든 의뢰인[고객들]",phrases:["attract a young clientele (젊은 고객들을 끌어들이다)","a very high class clientele (최상류층 고객들)"],examples:[{en:"The design store is attempting to market to a wealthier clientele.",ko:"디자인 가게는 돈이 많은 고객들을 상대로 판매하려 하고 있다."}],syn:["customers","patrons","clients"]},
  {w:"complimentary",p:"/ˌkɒmplɪˈmentəri/",m:"무료의",phrases:["complimentary tickets (무료 티켓, 초대권)","provide a complimentary bottle of wine (와인 한 병을 서비스로 제공하다)"],examples:[{en:"The bookstore gave away complimentary tote bags on its opening day.",ko:"그 서점은 개점일에 무료로 토트백을 나누어 주었다."}],syn:["free","gratis","courtesy"]},
  {w:"credit",p:"/ˈkredɪt/",m:"신용; 외상, 신용 거래; 학점",phrases:["credit rating (신용 등급)","buy a product on credit (물건을 외상으로 사다)"],examples:[{en:"What are the last four digits of your credit card number?",ko:"신용 카드의 끝 번호 네 자리가 무엇입니까?"}],syn:["trust","loan","recognition"]},
  {w:"custom-made",p:"/ˈkʌstəmˌmeɪd/",m:"맞춤의, 주문 제작의",phrases:["a custom-made suit (맞춤 정장)","custom-made furniture (주문 제작한 가구)"],examples:[{en:"The custom-made suit was one of the finest he had ever seen.",ko:"그 맞춤 정장은 그가 여태껏 본 정장 중에 가장 훌륭한 것이었다."}],syn:["tailor-made","bespoke","personalized"]},
  {w:"defective",p:"/dɪˈfektɪv/",m:"결함이 있는, 하자 있는",phrases:["defective goods (불량품)","return a defective product (결함이 있는 제품을 반품하다)"],examples:[{en:"We will repair any sunglasses found to be defective during the warranty period.",ko:"보증 수리 기간 동안 하자가 있는 선글라스는 수리해 드립니다."}],syn:["faulty","flawed","broken"]},
  {w:"discount",p:"/ˈdɪskaʊnt/",m:"할인",phrases:["get a discount (할인받다)","large discount store (대형 할인 매장)"],examples:[{en:"Discounts anywhere from 25% to 40% are not uncommon.",ko:"25~40퍼센트의 할인은 어디서나 흔하다."}],syn:["reduction","markdown","deduction"]},
  {w:"exchange",p:"/ɪksˈtʃeɪndʒ/",m:"교환; 교환하다",phrases:["currency exchange (환율)","exchange phone numbers (전화번호를 주고받다)"],examples:[{en:"I'm an exchange student from Canada.",ko:"캐나다에서 교환 학생으로 왔어요."}],syn:["swap","trade","barter"]},
  {w:"exorbitant",p:"/ɪɡˈzɔːrbɪtənt/",m:"과도한, 터무니없는",phrases:["an exorbitant charge (터무니없는 요금)","exorbitant housing prices (터무니없이 높은 집값)"],examples:[{en:"Farmers in developed nations often receive exorbitant subsidies that give them an unfair advantage.",ko:"선진국의 농민들은 종종 그들에게 불공평한 이득이 되는 과도한 보조금을 받는다."}],syn:["excessive","outrageous","unreasonable"]},
  {w:"gorgeous",p:"/ˈɡɔːrdʒəs/",m:"눈부시게 아름다운, 매우 화려한",phrases:["a gorgeous dress (아주 멋있는 드레스)","You look gorgeous! (당신 아주 아름다워!)"],examples:[{en:"Machu Picchu is one of the most gorgeous and mysterious ancient locales in the world.",ko:"마추픽추는 세계에서 가장 멋있고 신비스러운 고대 유적지 중 하나이다."}],syn:["stunning","beautiful","magnificent"]},
  {w:"guarantee",p:"/ˌɡærənˈtiː/",m:"보장[보증]하다; 보증(서)",phrases:["be guaranteed against defects (제품 결함에 대해 보증되다)","money-back guarantee (환불 보증)"],examples:[{en:"Protections ordinarily afforded by the rule of law are not guaranteed.",ko:"통상 법률이 제공하는 보호는 보장할 수 없습니다."}],syn:["assure","promise","warranty"]},
  {w:"haggle",p:"/ˈhæɡəl/",m:"흥정하다",phrases:["haggle over the price (가격에 대해 흥정하다)","haggle with a salesman (세일즈맨과 흥정하다)"],examples:[{en:"At Cars4U, we've eliminated the negotiation and haggling process, so your shopping experience is pleasant and hassle-free.",ko:"카스포유에서는 협상과 흥정의 과정을 없앴기 때문에 고객님의 쇼핑이 즐겁고 번거롭지 않습니다."}],syn:["bargain","negotiate","barter"]},
  {w:"inventory",p:"/ˈɪnvəntɔːri/",m:"재고품, 재고 목록",phrases:["dispose of the inventory (재고품을 처리하다)","inventory control (재고 관리)"],examples:[{en:"To make way for next year's new models, Deerbar is selling off its entire remaining inventory at wholesale prices!",ko:"내년도 신형 모델 입고를 위해 디어바에서는 남아 있는 전 재고 물량을 도매가에 처분하고 있습니다!"}],syn:["stock","supply","goods"]},
  {w:"luxurious",p:"/lʌɡˈʒʊəriəs/",m:"호화로운, 고급의",phrases:["live in a luxurious house (호화로운 집에 살다)","enjoy a luxurious lifestyle (호화로운 삶을 누리다)"],examples:[{en:"Although we tend to think of castles as luxurious, they were strictly functional and had very few comforts.",ko:"우리는 성을 사치스럽다고 생각하는 경향이 있지만, 성은 철저히 기능적이었으며 아주 적은 편의 시설들만 갖추고 있었다."}],syn:["lavish","opulent","sumptuous"]},
  {w:"ostentatious",p:"/ˌɒstənˈteɪʃəs/",m:"과시하는, 호화로운",phrases:["ostentatious jewelry (호화로운 보석)","an ostentatious display of wealth (부의 과시, 돈 자랑)"],examples:[{en:"Nonsensical ideas expressed with ostentatious verbiage — that's how one critic described postmodernist theories.",ko:"한 비판론자는 포스트모더니즘 이론을 과시적인 장황함과 현학성으로 표현된 터무니없는 개념이라고 설명했죠."}],syn:["showy","pretentious","flashy"]},
  {w:"outgrow",p:"/ˌaʊtˈɡroʊ/",m:"~보다 더 커지다, 더 크게 자라다",phrases:["Kids outgrow their clothes. (아이들이 커서 옷이 안 맞는다.)","outgrow his older brother (동생이 형보다 더 커지다)"],examples:[{en:"The Smiths are moving into a larger house since they have outgrown their current one.",ko:"스미스 씨 가족은 지금 사는 집이 비좁아져서 더 큰 집으로 이사할 것이다."}],syn:["surpass","exceed","grow beyond"]},
  {w:"priceless",p:"/ˈpraɪsləs/",m:"매우 귀중한",phrases:["a priceless collection of antiques (매우 귀중한 골동품 수집품)","priceless information (매우 귀중한 정보)"],examples:[{en:"The woman refused to sell the jewelry, as she considered it priceless.",ko:"그 여자는 그 보석을 매우 귀중하게 여겼기 때문에 팔려고 하지 않았다."}],syn:["invaluable","precious","inestimable"]},
  {w:"purchase",p:"/ˈpɜːrtʃəs/",m:"구입[구매]하다; 구입, 구매",phrases:["purchase goods on credit (신용 카드로 제품을 구매하다)","make a purchase of (∼을 구매하다)"],examples:[{en:"Those of you who have not purchased the textbook may get it from the student union bookstore.",ko:"여러분 중 교과서를 구입하지 않은 사람은 학생 조합 서점에서 책을 구할 수 있습니다."}],syn:["buy","acquire","obtain"]},
  {w:"wardrobe",p:"/ˈwɔːrdroʊb/",m:"옷장; (갖고 있는) 옷",phrases:["hang the jacket in the wardrobe (재킷을 옷장 안에 걸다)","have an extensive wardrobe (옷이 많다)"],examples:[{en:"This is the darkest tie I have in my wardrobe.",ko:"이게 제 옷장에서 가장 짙은 색 넥타이예요."}],syn:["closet","clothing","outfits"]},
  {w:"reasonable",p:"/ˈriːzənəbl/",m:"합리적인, (가격이) 적정한",phrases:["a reasonable decision (합리적인 결정)","meals at a reasonable price (가격이 적당한 괜찮은 식당)"],examples:[{en:"Do you know any good restaurants downtown that offer meals at a reasonable price?",ko:"시내에 가격이 적당한 괜찮은 식당을 알고 있나요?"}],syn:["fair","sensible","affordable"]},
  {w:"receipt",p:"/rɪˈsiːt/",m:"영수증; 받음, 수취",phrases:["make out a receipt (영수증을 쓰다)","keep one's receipt (영수증을 보관해 두다)"],examples:[{en:"If you have your receipts, your travel expenses can be reimbursed.",ko:"만약 영수증을 갖고 있으면 여행 경비를 환급받을 수 있어요."}],syn:["invoice","proof of purchase","voucher"]},
  {w:"refund",p:"/ˈriːfʌnd/",m:"환불(금); 상환[환불]하다",phrases:["demand a refund (환불을 요구하다)","a tax refund (세금 환급금)"],examples:[{en:"He has not been given a refund for the returned product.",ko:"그는 반품한 제품에 대한 환불을 받지 못했다."}],syn:["reimbursement","repayment","rebate"]},
  {w:"retail",p:"/ˈriːteɪl/",m:"소매",phrases:["a retail outlet (소매점)","retail price (소매가)"],examples:[{en:"Vitamins and supplements can be purchased over the Internet and in retail stores.",ko:"비타민과 영양 보충제는 인터넷과 소매점에서 구입할 수 있다."}],syn:["wholesale opposite","store","shop"]},
  {w:"secondhand",p:"/ˌsekəndˈhænd/",m:"간접의; 중고의",phrases:["secondhand smoke (간접흡연)","buy the camera secondhand (카메라를 중고로 사다)"],examples:[{en:"Save money by visiting some local secondhand stores.",ko:"인근에 있는 중고 상점을 이용해서 돈을 절약하십시오."}],syn:["used","pre-owned","indirect"]},
  {w:"select",p:"/sɪˈlekt/",m:"선택[선발]하다; 엄선된",phrases:["select one item from the list (목록에서 한 항목을 선택하다)","a few select employees (소수의 엄선된 직원들)"],examples:[{en:"He should select someone who he feels can handle it.",ko:"그는 그가 생각하기에 그 일을 처리할 수 있는 사람을 골라야겠지요."}],syn:["choose","pick","elect"]},
  {w:"spree",p:"/spriː/",m:"흥청망청하기, 흥청거림",phrases:["go on a shopping spree (흥청망청 쇼핑하다)","spend money on a drinking spree (흥청거리며 술을 마시는 데 돈을 쓰다)"],examples:[{en:"Susie went on a shopping spree.",ko:"수지는 쇼핑에 푹 빠졌어."}],syn:["binge","splurge","fling"]},
  {w:"spurious",p:"/ˈspjʊəriəs/",m:"거짓의, 겉만 그럴싸한",phrases:["spurious gem (가짜 보석)","be downright spurious (완전히 거짓이다)"],examples:[{en:"Advertisers should be held responsible for making spurious claims about their products.",ko:"광고주들은 자사의 상품에 대해 허위 주장을 한 책임을 져야 한다."}],syn:["fake","false","counterfeit"]},
  {w:"suit",p:"/suːt/",m:"적합하다; ~에 어울리다; 정장; 소송",phrases:["wear a business suit (비즈니스 정장을 입다)","file a suit against (∼을 상대로 소송을 제기하다)"],examples:[{en:"Find out which charity has a mission and goals that best suit your priorities.",ko:"어떤 자선 단체가 당신이 가장 중요하게 생각하는 일에 가장 적합한 사명과 목적을 가지고 있는지 알아보십시오."}],syn:["match","fit","costume"]},
  {w:"auction",p:"/ˈɔːkʃən/",m:"경매; 경매에서 팔다",phrases:["buy the picture at auction (그림을 경매에서 사다)","hold an auction (경매를 열다)"],examples:[{en:"Activities will include a silent auction, an arts and crafts show, a battle of the bands, dancing, and picnic games.",ko:"입찰식 경매와 미술 및 수공예품 전시, 음악 밴드 경연, 춤, 야외 게임의 활동이 진행될 예정입니다."}],syn:["sale","bidding","public sale"]},
  {w:"range",p:"/reɪndʒ/",m:"범위, 다양성; (범위가) ~에서 ~까지 이르다",phrases:["a wide range of (범위가 대단히 다양한)","top of the range (최고 수준)"],examples:[{en:"What price range did you have in mind?",ko:"어느 정도의 가격대를 생각하셨습니까?"}],syn:["variety","scope","spectrum"]}
]},

8:{theme:"Food",theme_kr:"음식",words:[
  {w:"protein",p:"/ˈproʊtiːn/",m:"단백질",phrases:["rich in protein (단백질이 풍부한)","a source of protein (단백질원)"],examples:[{en:"You need to consume enough protein to build muscles.",ko:"근육을 키우려면 단백질 섭취가 필요하다."}],syn:["nutrients","macronutrient"]},
  {w:"serving",p:"/ˈsɜːrvɪŋ/",m:"1인분",phrases:["enough for four servings (4인분으로 충분한)"],examples:[{en:"Eating two to four servings of fish a week reduces the risk of strokes by 6%.",ko:"일주일에 생선을 두 번 내지 네 번 먹으면 뇌졸중 위험을 6%까지 줄여 준다."}],syn:["portion","helping","amount"]},
  {w:"gourmet",p:"/ˈɡʊərmeɪ/",m:"미식가의; 미식가, 식도락가",phrases:["gourmet restaurant (고급 식당)","gourmet meal (고급 요리)"],examples:[{en:"Gourmet chefs put much thought into preparing dishes.",ko:"일류 요리사들은 요리를 준비하는 데 많은 생각을 쏟는다."}],syn:["connoisseur","epicure","foodie"]},
  {w:"quench",p:"/kwentʃ/",m:"(갈증을) 해소하다",phrases:["quench one's thirst (목을 축이다)","quench a fire (불을 끄다)"],examples:[{en:"Cold green tea is great for quenching your thirst.",ko:"차가운 녹차는 갈증을 해소하는데 최고다."}],syn:["satisfy","slake","extinguish"]},
  {w:"additive",p:"/ˈædətɪv/",m:"첨가물",phrases:["food additives (식품 첨가제)"],examples:[{en:"Our yogurt contains only organic ingredients, with no additives or preservatives.",ko:"우리 요거트는 첨가제나 방부제 없이 오직 유기농 재료만 쓰고 있습니다."}],syn:["preservative","supplement","ingredient"]},
  {w:"gratuity",p:"/ɡrəˈtjuːɪti/",m:"팁, 사례금",phrases:["a 15 percent gratuity (15퍼센트 팁)","give a small gratuity (약간의 사례를 하다)"],examples:[{en:"This bill includes a gratuity.",ko:"이 계산서에는 팁이 포함되어 있다."}],syn:["tip","bonus","reward"]},
  {w:"exceptional",p:"/ɪkˈsepʃənəl/",m:"특출한, 뛰어난; 극히 예외적인",phrases:["an exceptional student (뛰어난 학생)","an exceptional promotion (이례적인 승진)"],examples:[{en:"The article gave J&J Restaurant its highest accolade for exceptional food and service.",ko:"그 기사는 J&J 식당의 뛰어난 음식과 서비스에 대해 최고의 칭찬을 했다."}],syn:["outstanding","extraordinary","remarkable"]},
  {w:"delicacy",p:"/ˈdelɪkəsi/",m:"진미, 별미",phrases:["local delicacies (지역의 별미들)"],examples:[{en:"When bananas first came to Korea, they were a prized delicacy.",ko:"바나나가 처음 한국에 들어왔을 때 그것은 귀중한 진미였다."}],syn:["treat","specialty","luxury food"]},
  {w:"appetite",p:"/ˈæpɪtaɪt/",m:"식욕; 욕구",phrases:["have a good appetite (식욕이 왕성하다)","lose one's appetite (식욕을 잃다)"],examples:[{en:"In spite of her large appetite, Gloria manages to stay thin.",ko:"글로리아는 식욕이 왕성함에도, 날씬한 몸매를 간신히 유지하고 있다."}],syn:["hunger","craving","desire"]},
  {w:"beverage",p:"/ˈbevərɪdʒ/",m:"음료",phrases:["alcoholic beverages (알코올음료)","cooling beverages (청량음료)"],examples:[{en:"All beverages at the music festival will be free.",ko:"음악 페스티벌의 모든 음료가 무료입니다."}],syn:["drink","liquid","refreshment"]},

  {w:"cater",p:"/ˈkeɪtər/",m:"(사업으로 행사에) 음식을 공급하다; (요구·필요에) 맞춰 주다",phrases:["cater the banquet (연회에 음식을 공급하다)","cater to foreign tourists (외국인 관광객들을 충족시키다)"],examples:[{en:"Specialty shops generally cater to a particular kind of customer by providing personalized service and unique merchandise.",ko:"전문점들은 일반적으로 개인 맞춤형 서비스와 독특한 상품을 제공함으로써 특정 고객의 요구를 만족시킨다."}],syn:["provide","serve","accommodate"]},

  {w:"decay",p:"/dɪˈkeɪ/",m:"부패, 부식; 썩다, 부패하다",phrases:["the moral decay (도덕적 타락)","decaying food (썩어 가는 음식)"],examples:[{en:"Bacteria in the mouth that cause tooth decay also inhibit some throat infections and pneumonia.",ko:"충치의 원인이 되는 입안의 박테리아는 또한 인후 감염과 폐렴을 억제합니다."}],syn:["rot","decompose","deteriorate"]},

9:{theme:"Law & Crime",theme_kr:"법과 범죄",words:[
{w:"elude",pos:"v",m:"교묘히 피하다",phrases:["elude the police|경찰을 피하다"],ex:"The former manager, who is accused of embezzling company funds, has <b>eluded</b> capture for years.",ex_kr:"회사 자금 횡령으로 고소된 전임 경영진이 수년간 체포를 피했다.",syn:"elusive 찾기 힘든"},
{w:"conspire",pos:"v",m:"공모하다",phrases:["conspire to overthrow the government|정부 전복 음모를 꾸미다","conspire against the king|왕에 대항하여 모반을 꾀하다"],ex:"A group of traders <b>conspired</b> to reap unlawful profits by secretly manipulating stock prices.",ex_kr:"어떤 거래자 모임은 주가를 은밀히 조작해서 불법 수익을 공모했다.",syn:"collude 공모하다"},
{w:"deprive",pos:"v",m:"박탈하다",phrases:["deprive many fishermen of their livelihood|많은 수산업자들의 생계를 빼앗다"],ex:"No one should be <b>deprived</b> of human rights.",ex_kr:"어느 누구도 인권이 박탈당하면 안 된다.",syn:"strip 빼앗다"},
{w:"accuse",pos:"v",m:"고발하다, 비난하다",phrases:["be accused of stealing the money|돈을 훔친 혐의로 고발되다","accuse her of lying|그녀가 거짓말을 하고 있다고 비난하다"],ex:"Having been <b>accused</b> of using illegal substances, the politician was bombarded with questions at a press conference.",ex_kr:"불법 약물 사용으로 기소되었던 그 정치인은 기자 회견장에서 질문 세례를 받았다.",syn:"defendant (민사) 피고"},
{w:"accomplice",pos:"n",m:"공범(partner)",phrases:["an accomplice in a crime|범죄의 공범자","an unwitting accomplice|부지불식간에 연루된 공범자"],ex:"The killer was not acting alone and probably had multiple <b>accomplices</b>.",ex_kr:"그 살인자는 혼자 행동하지 않고 아마도 다수의 공범이 있었을 것이다.",syn:"accomplish 성취하다 / principal 주범 / accessory 종범"},
{w:"adjourn",pos:"v",m:"(재판·회의 등을) 중단하다, 휴정[휴회]하다(postpone, defer, put off)",phrases:["adjourn the trial|재판을 휴정하다","be adjourned until next month|다음 달로 연기되다"],ex:"Justice Percy Granger <b>adjourned</b> the trial until the photographs are determined to be genuine or not.",ex_kr:"퍼시 그래인저 재판관은 그 사진이 진짜인지 아닌지 확인될 때까지 재판을 휴정했다.",syn:"adjoin 인접하다"},
{w:"allegation",pos:"n",m:"(잘못을 저질렀다는) 혐의, 주장",phrases:["refute the allegation|혐의를 부인하다","an allegation of bribery|뇌물 수수 혐의"],ex:"Officials speaking for the mayor have claimed that the recent <b>allegations</b> come from people connected to opponents of Mayor Cayonto and his leadership.",ex_kr:"시장을 대변하는 관계자들은 최근의 근거 없는 주장이 케이온토 시장과 그의 리더십에 반대하는 세력과 관련된 사람들로부터 나온다고 주장했다.",syn:"allegiance 충성 / alligator 악어"},

{w:"amnesty",pos:"n",m:"사면, 특사; (범행의) 자진 신고 기간",phrases:["give[grant] amnesty for all political prisoners|모든 정치범들을 사면하다","an amnesty on illegal weapons|불법 무기들에 대한 자진 신고"],ex:"Once they are granted <b>amnesty</b>, the illegal immigrants will no longer fear arrest.",ex_kr:"불법 이민자들이 한 번 사면을 받으면 더 이상 체포를 두려워하지 않을 것이다.",syn:"amnesia 기억상실증 / anemia 빈혈증"},

{w:"condemn",pos:"v",m:"비난[규탄]하다; (안전) 부적격 판정을 내리다; (사형을) 선고하다",phrases:["be condemned as a racist|인종 차별주의자로 비난받다","a condemned building|안전 부적격 판정을 받은 건물","be condemned to death|사형 선고를 받다"],ex:"Instead of <b>condemning</b> other people, let's try to understand them.",ex_kr:"다른 사람들을 비난하는 대신 그들을 이해하려고 노력하자.",syn:"contemn 경멸하다"},

{w:"deter",pos:"v",m:"단념시키다, ~하지 못하게 하다(prevent, discourage), ~을 방지하다",phrases:["deter people from going out|사람들을 밖에 나가지 못하게 하다","deter an enemy attack|적의 공격을 저지하다"],ex:"Suspicious spouses from all walks of life do not seem <b>deterred</b> by the investigation fee equivalent to $1,500 US.",ex_kr:"사회 각계각층의 의심 많은 배우자들은 1,500달러에 해당하는 조사 비용에 개의치 않는 듯하다.",syn:"defer 미루다 / desist 단념하다"},
{w:"embezzle",pos:"v",m:"횡령하다",phrases:["embezzle a large sum of public money|거액의 공금을 횡령하다","embezzle money from the clients|고객들이 맡긴 돈을 횡령하다","be convicted of embezzling|횡령으로 유죄를 선고받다"],ex:"The corrupt politician <b>embezzled</b> several thousand dollars of campaign funds.",ex_kr:"그 부패한 정치인은 수천 달러의 선거 자금을 횡령했다.",syn:"dazzle 눈부시게 하다 / drizzle 이슬비가 내리다"},
{w:"evade",pos:"v",m:"(책임을) 회피하다, 빠져나가다(elude)",phrases:["evade arrest[capture]|체포를 모면하다","evade the difficult question|어려운 질문을 피해가다","evade the law|법망을 피해가다"],ex:"Do you think he <b>evaded</b> any taxes?",ex_kr:"그가 탈세를 했을 거라고 생각하세요?",syn:"invade 침략하다 / wade (물을) 걸어서 건너다"},
{w:"ransom",pos:"n",m:"(납치·유괴된 사람에 대한) 몸값",phrases:["demand a ransom|몸값을 요구하다","hold the child for ransom|아이를 인질로 몸값을 요구하다"],ex:"The President said that his country would pay no <b>ransom</b> for the hostages.",ex_kr:"대통령은 인질에 대한 몸값을 지불하는 일은 없을 거라고 말했다.",syn:"reward 현상금, 사례금 / damages 배상금"},

{w:"pirate",pos:"n/v",m:"해적; 불법 복제자; 해적질하다",phrases:["the infamous pirate|악명 높은 해적","a software pirate|소프트웨어 불법 복제자","a pirated edition|해적판, 불법 복제물"],ex:"A loose network of fast ships protected the coastline from <b>pirates</b> in the late 1800s.",ex_kr:"1800년대 후반에 고속선들의 느슨한 네트워크가 해적들로부터 해안선을 보호했다.",syn:"plagiarism 표절"},
{w:"plead",pos:"v",m:"(법정에서) 변론하다, 진술하다; 간청[탄원]하다(beg, entreat, implore)",phrases:["plead guilty[innocent]|유죄[무죄]라고 답변하다","plead for mercy|자비를 간청하다","plead with the judge|판사에게 탄원하다"],ex:"Former Congresswoman Kate Winslow <b>pleads</b> guilty to receiving illegal campaign donations.",ex_kr:"케이트 윈슬로 전 하원 의원이 불법 선거 자금 수수 혐의를 인정했습니다.",syn:"flea 벼룩 / flee 도망치다"},

{w:"surveillance",pos:"n",m:"(죄수 등의) 감시, 감독",phrases:["keep a suspect under surveillance|용의자를 감시하다","a surveillance camera|감시 카메라"],ex:"The government is preparing a <b>surveillance</b> system for tracking Internet users and monitoring all activity on certain websites.",ex_kr:"정부는 인터넷 사용자들을 추적하고, 특정 웹 사이트에서의 모든 활동을 감시하는 감시 시스템을 준비하고 있다.",syn:"survey (설문) 조사; 사찰; 조사하다; 측량하다"},

{w:"investment",pos:"n",m:"투자",phrases:["offshore investment|해외 투자","an investment portfolio|(개인이나 회사의) 보유 투자 종목"],ex:"A lot of naive investors have been out of their savings by con artists promoting dubious high-yield <b>investments</b>.",ex_kr:"많은 순진한 투자자들은 미심쩍은 수익성이 높은 투자를 홍보하는 사기꾼들에 의해 저축한 돈을 사기당했다.",syn:"contribute 기여하다"},
{w:"affiliated",pos:"a",m:"소속된, 연계된(associated)",phrases:["a government-affiliated institute|정부 산하 기관","a hospital affiliated to the university|대학의 부속 병원"],ex:"Since 1990, the Oregon Educational Homestay Program has been introducing American students to the marvelous culture of Japan via partnership alliances with several <b>affiliated</b> Japanese cities.",ex_kr:"1990년 이래로 오리건 교육 홈스테이 프로그램은 일본의 몇몇 자매결연을 맺은 도시들과 파트너십 제휴를 통해 미국 학생들에게 일본의 놀라운 문화를 접하게 해 주었다.",syn:"filial 자식의"},
{w:"merger",pos:"n",m:"합병(amalgamation)",phrases:["a merger between the two companies|두 회사 간의 합병","propose[oppose] a merger with|~와 합병을 제안하다[반대하다]"],ex:"The pace of bank <b>mergers</b> is likely to accelerate.",ex_kr:"은행 합병의 속도가 가속화될 전망이다.",syn:"emerge 나오다, 나타나다 / submerge 물에 담그다"},
{w:"barter",pos:"n/v",m:"물물 교환; 물물 교환하다(exchange, trade, swap)",phrases:["barter eggs for cheese|계란과 치즈를 맞바꾸다","barter with the owner of the store|상점 주인과 물물 교환하다"],ex:"It can be nearly impossible to keep track of transactions in a <b>barter</b> economy.",ex_kr:"물물 교환의 경제에서 거래 내역을 추적하는 것은 불가능에 가까울 것이다.",syn:"banter 농담하다"},
{w:"boost",pos:"v/n",m:"밀어 올리다, 북돋우다; 밀어 올림, 경기 부양",phrases:["boost profits|이윤을 늘리다","boost the immune system|면역 체계를 강화하다","boost morale|사기를 북돋우다"],ex:"Why don't we run a full-page ad in major daily newspapers to <b>boost</b> sales?",ex_kr:"판매 증진을 위해 주요 일간 신문에 전면 광고를 내는 건 어때요?",syn:"booth 부스, 칸막이 박스"},
{w:"commercial",pos:"a/n",m:"상업의; 이윤을 목적으로 하는, 상업적인; (텔레비전·라디오의) 광고 (방송)",phrases:["a commercial city|상업 도시","a commercial trick|상업적인 속임수","appear in TV commercials|TV 광고에 출연하다"],ex:"A child who watches three or more hours of <b>commercial</b> television could be exposed to as many as 30 minutes of advertising.",ex_kr:"3시간 이상 상업 방송을 보는 아이는 광고에 30분씩이나 노출될 수 있다.",syn:"commence 시작하다, 착수하다 / commend 칭찬하다; 권하다 / mercenary 돈을 목적으로 하는"},
{w:"conglomerate",pos:"n",m:"(거대) 복합 기업, 대기업",phrases:["a financial conglomerate|복합 금융 그룹","a industrial conglomerate|산업 재벌","a media conglomerate|언론 복합 기업"],ex:"Many of today's <b>conglomerates</b> began as small, regional enterprises.",ex_kr:"오늘날의 많은 대기업들은 소규모의 지역 기업으로 시작했다.",syn:"agglomerate 덩어리(의)"},
{w:"constitute",pos:"v",m:"구성하다(make up, form); ~와 다름없다",phrases:["constitute a committee|위원회를 구성하다","Twelve months constitute a year.|12개월은 1년이 된다."],ex:"Together they <b>constitute</b> a common labor market and a common passport area, much like the European Union.",ex_kr:"이들은 함께 EU처럼 공동 노동 시장과 공동 여행 지역을 구성한다.",syn:"destitute 궁핍한, 빈곤한 / institute 설립하다; 실시하다"},
{w:"downsize",pos:"v",m:"(비용 절감을 위해) 줄이다, 축소하다(reduce, curtail)",phrases:["downsize the workforce|직원의 수를 줄이다","downsize a company|회사의 규모를 줄이다"],ex:"It plans to <b>downsize</b> the number of staff.",ex_kr:"회사는 직원 수를 축소할 계획이다.",syn:"downpour 폭우 / downright 솔직한; 철저한"},
{w:"downturn",pos:"n",m:"(경기) 하락, 침체(recession, depression ↔ upturn 상승, 호전)",phrases:["a downturn in sales[trade/business]|매출 감소[거래 위축/사업 부진]","suffer a downturn|침체를 겪다"],ex:"They say the economic <b>downturn</b> has made this a lean year.",ex_kr:"경기 침체 때문에 올해 영 실적이 안 좋대요.",syn:"overturn 뒤집다; 전복; 타도 / turnover 총 매상, 거래액; 이직률"},
{w:"establish",pos:"v",m:"설립[확립]하다(set up); (사실을) 규명하다, 밝히다(prove)",phrases:["establish a school|학교를 설립하다","establish a good relationship with|~와 좋은 관계를 확립하다","establish the cause of the accident|사고의 원인을 규명하다"],ex:"What is certain is that by 1592 Shakespeare had <b>established</b> himself as an actor and a playwright of note.",ex_kr:"분명한 것은, 1592년에 이르러 셰익스피어는 유명한 배우이자 극작가로 이미 그 이름을 알렸다는 것이다.",syn:"reestablish 복구하다 / anti-establishment 반체제 운동의"},
{w:"executive",pos:"n/a",m:"(기업·조직의) 이사, 중역, 간부; 경영의, 행정[집행]의",phrases:["Chief Executive Officer|최고경영자(CEO)","top executives on high salaries|높은 연봉을 받는 고위 간부들"],ex:"The ascension of a Western <b>executive</b> in corporate Japan reflects the distance that the nation has traveled from the insularity of the late 1980s.",ex_kr:"일본 기업에서 서양 임원의 승진은 일본이 1980년대 후반의 편협성으로부터 얼마나 크게 달라졌는지를 보여 준다.",syn:"consecutive 연속적인 / persecutive 괴롭히는 / diminutive 작은"},
{w:"franchise",pos:"n",m:"판매권, 사업권; 투표권(suffrage); 체인점",phrases:["grant an exclusive franchise|독점 판매권을 주다","extend the franchise to women|투표권을 여성에게 확대하다"],ex:"Today, the restaurant announced new <b>franchise</b> opportunities in the New York area.",ex_kr:"오늘 그 식당은 뉴욕 지역에서 새로운 체인점의 기회가 있음을 알렸다.",syn:"enfranchise 참정권[선거권]을 주다"},
{w:"indication",pos:"n",m:"징조, 조짐(sign, signal)",phrases:["indication of the economic recovery|경제 회복의 조짐"],ex:"To community outsiders, the town of Melville gives every <b>indication</b> that it is prosperous.",ex_kr:"이 지역에 살지 않는 사람에게 멜빌이라는 마을은 풍요롭다는 인상을 충분히 준다.",syn:"vindication 옹호, 지지; 해명, 입증"},
{w:"initiate",pos:"v",m:"시작[착수]하다(enter into)",phrases:["initiate a new business|새 사업을 시작하다","initiate political reforms|정치 개혁을 시작하다"],ex:"In some Mozambique tribes, ritual scarring is performed during a special life event, such as when a boy is <b>initiated</b> into manhood.",ex_kr:"일부 모잠비크 부족들의 경우 상흔 의식은 소년이 성인 남자로 신고식을 치를 때와 같은 특별히 일생의 큰 행사 중에 치러졌다.",syn:"iterate 반복하다"},
{w:"lucrative",pos:"a",m:"수익성이 좋은(profitable, rewarding)",phrases:["a lucrative job[market]|수익성이 좋은 일[시장]","inherit a lucrative business|돈 되는 사업을 물려받다"],ex:"China's spiraling divorce rate is proving to be a <b>lucrative</b> business, not just for law firms but for the booming field of marital investigations.",ex_kr:"중국의 이혼율 증가는 법률 회사뿐만 아니라 성업 중인 결혼 관련 수사 분야에서도 돈벌이가 되는 사업인 것으로 입증되고 있다.",syn:"ludicrous 우스운, 터무니없는"},
{w:"barrier",pos:"n",m:"장벽, 장애물(obstacle, impediment)",phrases:["trade barriers|무역 장벽","break through a barrier|장벽을 뚫다"],ex:"Political boundaries can act as <b>barriers</b> to the spread of ideas or knowledge, thereby retarding cultural diffusion.",ex_kr:"정치적 경계는 사상과 지식 전파에 장애물로 작용하기 때문에 문화 확산을 지체시킨다.",syn:"barrel 통, 다랑"},
{w:"monopolize",pos:"v",m:"독점하다",phrases:["monopolize the market|시장을 독점하다","monopolize all the information|모든 정보를 독점하다"],ex:"China has effectively <b>monopolized</b> many of the markets that Singapore used to compete for.",ex_kr:"중국은 싱가포르와 다투곤 했던 다수의 시장을 효과적으로 독점했다.",syn:"oligopoly 소수 독점, 과점 / monotony 단조로움"},
{w:"negotiate",pos:"v",m:"협상[교섭]하다",phrases:["negotiate over[about] the price|가격에 대해 협상하다","negotiate for a wage rise|임금 인상을 위해 협상하다"],ex:"Max Electronics wants to re<b>negotiate</b> the contract that they signed with us.",ex_kr:"맥스 전자가 우리와 이미 체결한 계약을 놓고 다시 협상하기를 원해요.",syn:"compromise 타협하다(협상의 과정이 끝나고 양측의 의견을 조정한 이후)"},
{w:"niche",pos:"n",m:"(시장의) 틈새; 꼭 맞는 자리[일], 적소",phrases:["spot a niche in the market|시장의 틈새를 찾아내다","find one's niche as a teacher|교사라는 꼭 맞는 일을 찾다"],ex:"Now, 20 years later, the festival has carved out a <b>niche</b> as one of the best of its kind in the world.",ex_kr:"20년이라는 세월이 흐른 지금, 이 축제는 세계 최고의 영화제 중 하나로 자리매김했습니다.",syn:"richen 부유하게 하다"},
{w:"outsource",pos:"v",m:"(작업·생산을) 외부에 위탁하다, 아웃소싱하다",phrases:["outsource the management of their facilities|그들의 시설 관리를 외부에 위탁하다","outsource to cut costs|비용을 절감하기 위해 외부에 위탁하다"],ex:"Morgan Stanley estimates that the number of US jobs <b>outsourced</b> to India will double to about 150,000 in the next three years.",ex_kr:"모건 스탠리는 인도로 아웃소싱된 미국의 일자리의 수가 두 배로 뛰어 3년 후에는 약 15만 개에 이를 것으로 전망하고 있다.",syn:"source 원천, 출처 / resource 자원, 자산, 부"},
{w:"plummet",pos:"v",m:"급락하다, 곤두박질치다(plunge, nosedive ↔ soar 급등하다)",phrases:["plummet 30%|30퍼센트 급락하다","plummet to the bottom|바닥으로 곤두박질치다"],ex:"Homeowners in America are worried because the value of their real estate has <b>plummeted</b> in recent months.",ex_kr:"미국의 주택 보유자들은 자기 소유의 부동산 가치가 최근 몇 달간 곤두박질쳤기 때문에 우려하고 있다.",syn:"plumb 연추; 깊이를 재다 / plumber 배관공"},
{w:"privatize",pos:"v",m:"민영화하다(denationalize ↔ nationalize 국유화하다)",phrases:["privatize state industries|국유 산업들을 민영화하다","privatize the municipal power company|시가 소유한 전력 회사를 민영화하다"],ex:"In the 1990s, President Fujimori <b>privatized</b> the mining and oil industries and implemented austerity measures.",ex_kr:"1990년대에는 후지모리 대통령이 광업과 석유 산업을 민영화했고 긴축 정책을 실행했다.",syn:"privation 궁핍; 박탈, 몰수 / deprive 빼앗다"},
{w:"product",pos:"n",m:"상품, 제품(goods, merchandise, commodity); 산물, 결과물",phrases:["a finished product|완제품","a product of one's study|연구의 성과[산물]"],ex:"If your skin or eyes are sensitive, look for <b>products</b> that are hypoallergenic and nonstinging.",ex_kr:"피부나 눈이 민감하다면 저자극성 및 무통성 제품을 찾아라.",syn:"by-product 부산물 / counter-productive 역효과의, 비생산적인 / reproduce 번식하다"},
{w:"proprietor",pos:"n",m:"(사업체·호텔 등의) 소유주(owner)",phrases:["a restaurant proprietor|식당 소유주","the proprietor of the department store|백화점의 소유주"],ex:"Please share any concerns you have with the <b>proprietor</b> of the establishment.",ex_kr:"그 기관의 소유주에 대해 갖고 있는 우려는 무엇이든지 공유해 주세요.",syn:"property 재산; 부동산; 특성 / propriety 적절성; 예절"},
{w:"questionnaire",pos:"n",m:"설문지",phrases:["complete[fill out/fill in] a questionnaire|설문지를 작성하다","a questionnaire on diet and exercise|식습관과 운동에 관한 설문지"],ex:"In addition to the survey <b>questionnaires</b>, Alpha Omega will be interviewing some of you.",ex_kr:"설문지로 조사하는 것 외에도, 알파 오메가는 여러분들 중 몇몇을 인터뷰할 것입니다.",syn:"quest 추구, 탐구 / inquest 심문, 조사 / request 부탁, 요청(하다) / conquest 정복"},
{w:"quote",pos:"v/n",m:"가격을 제시하다; 인용하다, (남의 말을 그대로) 옮기다(cite); 거래 가격(quotation); 인용(구)",phrases:["be quoted at 200 dollars|시세가 200달러이다","quote a passage from the Bible|성경에서 한 구절을 인용하다","stock quotations|주식 시세"],ex:"At no time did I attempt to, <b>quote</b> unquote, unionize them into a political lobby.",ex_kr:"저는 말하자면, 그들을 규합해 정치적 압력 단체로 만들려고 시도한 적이 단 한 번도 없습니다.",syn:"quota 할당량, 몫 / quarter 4분의 1; 15분; 25센트"},
{w:"rate",pos:"n/v",m:"속도(speed); 비율(~율); 요금(~로); 평가하다, 등급을 매기다(rank)",phrases:["increase at an alarming rate|무서운 속도로 증가하다","an hourly rate of pay|시간당 급료","be rated above average|평균 이상으로(훌륭한 것으로) 평가되다"],ex:"The Department of Labor announces a decline in the nation's jobless <b>rate</b>.",ex_kr:"노동부는 국내 실업률이 줄었다고 발표했습니다.",syn:"overrate 과대평가하다 / underrate 과소평가하다"},
{w:"recession",pos:"n",m:"불황, 불경기(depression)",phrases:["pull the country out of recession|나라를 불황에서 벗어나게 하다","fall into recession|불황에 빠지다"],ex:"We're going through a bad <b>recession</b> right now.",ex_kr:"우리는 지금 심한 불황을 겪고 있다.",syn:"cession 할양, (권리의) 양도 / cessation 중지, 중단"},
{w:"replace",pos:"v",m:"대신[대체]하다(substitute, supersede, supplant)",phrases:["replace workers with robots|근로자들을 로봇으로 대체하다","replace plastic bags with paper bags|비닐봉지를 종이봉투로 대체하다"],ex:"Many blue-collar workers and clerks have been <b>replaced</b> by computers due to the advance and spread of the efficient modern device.",ex_kr:"많은 육체 노동자들과 점원들은 효율적인 근대 기기들의 발전과 확산으로 인하여 컴퓨터로 대체되었다.",syn:"substitute B for A A 대신 B를 대용하다"},
{w:"revenue",pos:"n",m:"(기업의) 수익; (정부의) 세입",phrases:["the company's annual revenues|회사의 연간 수익"],ex:"Phone network operators are looking to profit from pay-per-click advertising <b>revenue</b> in much the same way Internet giants like Google have.",ex_kr:"휴대전화 네트워크 운영자들은 구글과 같은 거대 인터넷 기업들이 하는 것과 똑같은 방식으로 클릭당 광고료를 지불하는 광고 수입에서 이득을 얻기를 기대하고 있습니다.",syn:"venue 개최지 / avenue 가로수길, 대로"},

{w:"mortgage",pos:"n",m:"(담보) 대출(금)",phrases:["a monthly mortgage payment|매월 담보 대출금 납입"],ex:"Most people arrange a <b>mortgage</b> with a bank before they buy a house.",ex_kr:"대부분 사람들은 주택을 구입하기 전 은행에 담보 대출을 설정한다.",syn:"mortality 죽을 운명; 사망률"},
{w:"portfolio",pos:"n",m:"(보유 중인) 금융 자산 목록, 포트폴리오",phrases:["an investment portfolio|투자한 금융 자산 목록","a share portfolio|주식 투자 목록"],ex:"So it's no surprise that we offer a broad <b>portfolio</b> of support and network services.",ex_kr:"그래서 저희가 지원과 네트워크 서비스에 대해 광범위한 포트폴리오를 제공한다는 것은 놀라운 일이 아닙니다.",syn:"portage 운반 / portable 휴대용의"},
{w:"premium",pos:"n/a",m:"보험료; 할증료, 추가 요금; 우수한, 고급의",phrases:["car insurance premiums|차 보험료","pay a premium for organic vegetables|유기농 채소에 추가 요금을 내다","premium gasoline|고급 휘발유"],ex:"<b>Premiums</b> have risen an average of 63% over the last five years.",ex_kr:"지난 5년간 보험료는 평균 63퍼센트 올랐다.",syn:"premier 첫째의, 으뜸의"},
{w:"reimburse",pos:"v",m:"배상[변제]하다(compensate, indemnify)",phrases:["reimburse any expenses incurred|발생한 모든 비용을 배상하다"],ex:"Please note that we will only <b>reimburse</b> return shipping costs once the returned item has been verified as an incorrect delivery.",ex_kr:"일단 반품된 물품이 오배송으로 확인된 후에야 반송 배송비를 변상해 드린다는 점을 유념해 주십시오.",syn:"disburse 지불하다"},
{w:"stable",pos:"a",m:"안정적인(steady ↔ precarious 불안정한); 마구간",phrases:["stable prices|안정된 물가","get a stable job|안정적인 일자리를 얻다"],ex:"World interest rates have remained <b>stable</b> for the last ten weeks.",ex_kr:"국제 금리가 지난 10주간 안정적인 추세이다.",syn:"stab 찌르다 / table 제외하다; (의안을) 연기하다"},
{w:"statement",pos:"n",m:"계산서, 명세서; 진술, 성명(서)",phrases:["a financial statement|재무제표","a statement of credit|신용 카드 사용 내역서","a written statement|진술서","issue an official statement|공식 성명을 발표하다"],ex:"You will be helping to make a global <b>statement</b> about our commitment to solving the climate change problem.",ex_kr:"당신은 기후 변화 문제 해결에 대한 우리의 약속을 국제적으로 선언하는 데 도움을 줄 것입니다.",syn:"overstate 과장하다 / understate 줄여서 말하다"},
{w:"stock",pos:"n/v",m:"주식; 비축, (상품의) 재고; (제품을) 갖추고 있다, 보유하다",phrases:["buy and sell stocks|주식을 사고팔다","a country's housing stock|국가의 주택 보유량","stock only the finest goods|좋은 물건들만 갖추고 있다"],ex:"The <b>stock</b> market rose so quickly that it smashed all previous records.",ex_kr:"이전 기록을 모두 갱신하며 주가가 급상승했다.",syn:"stack 쌓다; 더미 / stick 찌르다; 들러붙다 / stockpile 비축량 / livestock 가축"},

{w:"tally",pos:"v/n",m:"~와 일치[부합]하다, 합산하다; (누적된) 기록(record)",phrases:["Your plans don't tally with mine.|당신의 계획과 제 계획은 일치하지 않아요.","the final tally|최종 기록","improve on one's tally|기록을 향상시키다"],ex:"Just give me a moment to <b>tally</b> your expenses.",ex_kr:"귀하의 비용을 합산하는 동안 잠시만 기다려 주십시오.",syn:"rally 집회; 반등; 재집결하다 / sally 출격, 돌격"},
{w:"withdraw",pos:"v",m:"(돈을) 인출하다; 철수[철회]하다",phrases:["withdraw $200 from one's bank account|계좌에서 200달러를 인출하다","withdraw a charge|고소를 취하하다","withdraw troops (from the region)|(지역에서) 군대를 철수시키다"],ex:"Customers seeking to <b>withdraw</b> money can do so at the ATMs outside.",ex_kr:"돈을 인출하려는 고객은 밖에 있는 ATM 기기를 이용하실 수 있습니다.",syn:"drawback 결점, 결함"},
{w:"yield",pos:"v/n",m:"(제품·작물 등을) 산출하다; (결과를) 초래하다; 항복[굴복]하다; 산출[수확]량",phrases:["yield a profit|이익을 내다","yield a good[bad] harvest|풍작[흉작]이다","yield to the enemy|적에게 굴복하다","yield to the temptation|유혹에 지다","a high crop yield|높은 작물 수확량"],ex:"Ads using MegaAd have <b>yielded</b> click-through rates 5 times higher than average online ads.",ex_kr:"메가애드를 이용한 광고는 보통의 온라인 광고보다 5배나 높은 클릭률을 가져왔다.",syn:"field 들판; 분야; 현장의 / shield 방패; 막다"}

13:{theme:"Traffic & Travel",theme_kr:"교통과 여행",words:[

  {w:"speed limit",pos:"n",p:"/spiːd ˈlɪmɪt/",m:"제한 속도",phrases:["break[exceed] the speed limit (제한 속도를 어기다[초과하다])"],ex:"The speed limits need to be heightened on highways.",ex_kr:"고속도로의 최고 제한 속도를 더 높여야 해.",syn:""},
  {w:"round trip",pos:"n",p:"/raʊnd trɪp/",m:"왕복 여행",phrases:["a round trip ticket (왕복표)","a round-trip fare (왕복 여행 비용)"],ex:"The round trip from New York City to Boston costs $60.",ex_kr:"뉴욕시에서 보스턴까지의 왕복 여행은 60달러이다.",syn:"one-way trip 편도 여행"},
  {w:"block",pos:"n/v",p:"/blɒk/",m:"구역, 단지; 사각형 덩어리; 막다, 차단하다",phrases:["live on the same block (같은 단지에 살다)","block the road (도로를 차단하다)"],ex:"For general groceries, there is a mini-supermarket called Alex's about 10 blocks away from here.",ex_kr:"일반 잡화류는 여기서 10블록 떨어진 곳에 알렉스라는 작은 슈퍼마켓에서 구입할 수 있습니다.",syn:"stumbling block 장애물"},
  {w:"bound",pos:"a",p:"/baʊnd/",m:"~으로 향하는; ~할 것 같은",phrases:["get on a plane bound for London (런던행 비행기에 타다)","be bound to succeed (성공할 가능성이 크다)"],ex:"Excuse me. Is the next train bound for Rome?",ex_kr:"실례합니다. 다음 열차가 로마행 기차인가요?",syn:"abound 풍부하다 / rebound 반동"},

  {w:"congested",pos:"a",p:"/kənˈdʒɛstɪd/",m:"붐비는, 혼잡한; 충혈된",phrases:["be congested with cars (차들로 붐비다)","congested eyes (충혈된 눈)"],ex:"The dry cleaners is on the congested road.",ex_kr:"세탁소는 혼잡한 길에 있다.",syn:"congestive heart failure 충혈성 심장 마비"},
  {w:"curb",pos:"v/n",p:"/kɜːrb/",m:"억제하다, 저지하다; 연석",phrases:["curb the spread of the virus (바이러스의 확산을 억제하다)","curb one's appetite (식욕을 억제하다)"],ex:"The travel agency is seeking to curb the number of customers canceling their vacation packages.",ex_kr:"여행사에서는 패키지여행을 취소하는 고객의 수를 억제하는 방안을 모색하는 중이다.",syn:"restrict / check 억제하다"},
  {w:"destination",pos:"n",p:"/ˌdɛstəˈneɪʃən/",m:"목적지, 도착지",phrases:["arrive at the destination (목적지에 도착하다)","a popular tourist destination (인기 있는 관광지)"],ex:"Everyone with a bike is welcome to come out on Sundays and ride with us to a new destination every week.",ex_kr:"자전거가 있는 사람은 누구나 매주 일요일에 새로운 장소로 저희와 함께 자전거를 탈 수 있습니다.",syn:"destined for ~을 운명인"},
  {w:"detour",pos:"n/v",p:"/ˈdiːtʊər/",m:"돌려 가는 길, 우회(로); 우회하다",phrases:["detour around the downtown traffic (시내를 돌아 우회하다)"],ex:"Drivers on Freeway 53 will be forced to take a detour at exit 11.",ex_kr:"53번 고속도로의 운전자들은 11번 출구에서 강제로 우회해야 할 것이다.",syn:"tour 순회 / contour 윤곽"},
  {w:"direction",pos:"n",p:"/dɪˈrɛkʃən/",m:"방향; 지시, 지휘",phrases:["provide direction (방향을 제시하다)","under the direction of (지휘하에)"],ex:"Let's pull over and ask for directions.",ex_kr:"차를 세우고 길을 물어보자.",syn:"correction 수정 / erection 직립"},

  {w:"itinerary",pos:"n",p:"/aɪˈtɪnərɛri/",m:"여행 일정(표)",phrases:["the next place on our itinerary (다음 행선지)"],ex:"This tour takes a leisurely pace but has a comprehensive itinerary.",ex_kr:"이 투어는 여유롭게 진행되지만 여행 일정은 다채롭습니다.",syn:"iterate 반복하다"},

//  APP STATE
// ══════════════════════════════════════════════════
let selDay=null, curStep='learn', curMode='mc';
let learnIdx=0, learnWords=[];
let testWords=[], testIdx=0, testOk=0, testNg=0, testHP=3;
let wrongList=[];
const AVAIL=Object.keys(DB).map(Number).sort((a,b)=>a-b);

// ══════════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════════
const TOPICS={1:"인간",2:"건강과 질병",3:"가족과 사회",4:"일상생활",5:"의사소통",6:"감정",7:"의류와 쇼핑",8:"음식",9:"법과 범죄",10:"경제",11:"직장 생활",12:"금융"};

function buildDayGrid(){
  const g=document.getElementById('day-grid');
  g.innerHTML='';
  for(let d=1;d<=30;d++){
    const b=document.createElement('button');
    const avail=!!DB[d];
    b.className='dbtn'+(d===selDay?' sel':'')+(avail?'':' lk');
    b.innerHTML=`<div style="font-size:13px;font-weight:700">Day ${d}</div><div style="font-size:10px;color:${avail?'inherit':'var(--gyll)'};margin-top:2px">${avail?(TOPICS[d]||DB[d].theme_kr):'준비중'}</div>`;
    if(avail) b.onclick=()=>selectDay(d);
    g.appendChild(b);
  }
}

function selectDay(d){
  selDay=d;
  document.querySelectorAll('.dbtn').forEach((b,i)=>b.classList.toggle('sel',i+1===d));
  const cnt=DB[d]?DB[d].words.length:0;
  document.getElementById('day-info').textContent=DB[d]?`Day ${d} · ${DB[d].theme_kr} · ${cnt}개 단어`:`Day ${d}: 준비 중`;
  updateHint();
}

function selStep(s){
  curStep=s;
  document.getElementById('tab-learn').classList.toggle('act',s==='learn');
  document.getElementById('tab-test').classList.toggle('act',s==='test');
  document.getElementById('mode-area').style.display=s==='test'?'block':'none';
  updateHint();
}

function selMode(m){
  curMode=m;
  ['mc','rev','sp','kr'].forEach(k=>{
    document.getElementById(`m-${k}`).className='btn sm'+(k===m?' tl':'');
  });
}

function updateHint(){
  const h=document.getElementById('go-hint');
  if(!selDay){h.textContent='Day를 선택하세요';return;}
  if(!DB[selDay]){h.textContent=`Day ${selDay}는 아직 준비 중이에요`;return;}
  const cnt=DB[selDay].words.length;
  h.textContent=`Day ${selDay} · ${curStep==='learn'?'학습':'테스트'} · ${cnt}개 단어`;
}

function go(){
  if(!selDay){showNotif('Day를 선택하세요');return;}
  if(!DB[selDay]){showNotif('아직 준비 중인 Day입니다');return;}
  if(curStep==='learn') startLearn();
  else startTest();
}

// ══════════════════════════════════════════════════
//  LEARN
// ══════════════════════════════════════════════════
function startLearn(){
  TTS.stop();
  learnWords=[...DB[selDay].words];
  learnIdx=0;
  document.getElementById('l-title').textContent=`Day ${selDay} · ${DB[selDay].theme_kr}`;
  showScreen('s-learn');
  renderLearn();
}

function renderLearn(){
  const w=learnWords[learnIdx];
  const total=learnWords.length;
  document.getElementById('l-counter').textContent=`${learnIdx+1} / ${total}`;
  document.getElementById('l-prog').style.width=`${((learnIdx+1)/total)*100}%`;
  document.getElementById('prev-btn').disabled=learnIdx===0;
  document.getElementById('next-btn').textContent=learnIdx===total-1?'완료 ✓':'다음 →';

  // TTS 시퀀스 점: 단어 · 뜻 · 예문 · 구문
  const seqLabels=['단어','뜻','예문','구문'];
  const dotHtml=seqLabels.map((_,i)=>`<div class="tts-dot" id="tts-dot-${i}"></div>`).join('');

  const phrasesHtml=(w.phrases||[]).map(ph=>{
    const parts=typeof ph==='string'?ph.split('|'):[ph,''];
    return `<div class="phrase"><strong>${parts[0]}</strong>${parts[1]?` <span style="color:var(--txm)">— ${parts[1]}</span>`:''}`;
  }).join('');

  const exHtml=w.ex?`
    <div class="wdiv"></div>
    <div class="wsec">기출 예문</div>
    <div class="exbox">
      <div class="exen">${w.ex}</div>
      ${w.ex_kr?`<div class="exko">${w.ex_kr}</div>`:''}
    </div>`:'';

  const synHtml=w.syn?`
    <div class="wdiv"></div>
    <div class="wsec">VOCA+</div>
    <div class="synbox">${w.syn}</div>`:'';

  document.getElementById('l-word').innerHTML=`
    <div class="wcard">
      <div class="whead">
        <div>
          <div class="wtop">
            <span class="wword">${w.w}</span>
            <span class="wpos">${w.pos||''}</span>
          </div>
          ${w.p?`<div class="wpron">${w.p}</div>`:''}
        </div>
        <button class="tts-btn" id="tts-main-btn" onclick="speakWord(learnWords[learnIdx], this, document.getElementById('tts-seq-dots'))">🔊</button>
      </div>

      <div class="tts-seq" id="tts-seq-dots">
        ${dotHtml}
        <span id="tts-seq-label" style="margin-left:4px;font-size:11px;color:var(--txm)">클릭하여 듣기</span>
      </div>

      <div class="wmean">${w.m}</div>

      ${phrasesHtml?`<div class="wdiv"></div><div class="wsec">구문</div><div class="phrases">${phrasesHtml}</div>`:''}
      ${exHtml}
      ${synHtml}
    </div>`;
}

function prevW(){
  TTS.stop();
  if(learnIdx>0){learnIdx--;renderLearn();}
}
function nextW(){
  TTS.stop();
  if(learnIdx<learnWords.length-1){learnIdx++;renderLearn();}
  else{toHome();}
}

// ══════════════════════════════════════════════════
//  TEST
// ══════════════════════════════════════════════════
function startTest(){
  TTS.stop();
  testWords=shuffle([...DB[selDay].words]);
  testIdx=0; testOk=0; testNg=0; testHP=3; wrongList=[];
  document.getElementById('t-title').textContent=`Day ${selDay} · ${DB[selDay].theme_kr}`;
  showScreen('s-test');
  renderQ();
}

function renderQ(){
  const total=testWords.length;
  document.getElementById('t-prog').textContent=`${testIdx+1}/${total}`;
  document.getElementById('t-ok').textContent=testOk;
  document.getElementById('t-ng').textContent=testNg;
  document.getElementById('hearts').textContent='💔'.repeat(testNg);

  const w=testWords[testIdx];
  let mode=curMode;
  if(mode==='kr'){mode='kr';}

  let html='';
  if(mode==='mc'){
    const others=testWords.filter((_,i)=>i!==testIdx);
    const wrongs=shuffle(others).slice(0,3);
    const opts=shuffle([w,...wrongs]);
    html=`<div class="qw sp-word" onclick="speakWordOnly('${w.w}')" title="클릭하여 발음 듣기">${w.w}<button class="tts-q-btn">🔊</button></div><div class="qs">${w.pos||''} · 클릭하면 발음을 들을 수 있어요</div>
      <div class="mc-grid">${opts.map(o=>`<button class="mc-opt" onclick="checkMC(this,'${o.m}')">${o.m}</button>`).join('')}</div>`;
  } else if(mode==='rev'){
    const others=testWords.filter((_,i)=>i!==testIdx);
    const wrongs=shuffle(others).slice(0,3);
    const opts=shuffle([w,...wrongs]);
    html=`<div class="qw">${w.m}</div><div class="qs">뜻에 맞는 영단어를 고르세요</div>
      <div class="mc-grid">${opts.map(o=>`<button class="mc-opt" onclick="checkMC(this,'${o.w}')">${o.w}</button>`).join('')}</div>`;
  } else if(mode==='sp'){
    html=`<div class="qw sp-word" onclick="speakWordOnly('${w.w}')" title="클릭하여 발음 듣기">${w.w}<button class="tts-q-btn">🔊</button></div><div class="qs">(${w.pos||'?'}) 한글 뜻을 입력하세요</div>
      <input class="sinp" id="sp-inp" placeholder="한글 뜻을 입력하세요" autocomplete="off" spellcheck="false">
      <button class="btn tl full" onclick="checkSP()" style="margin-top:10px">확인</button>`;
  } else if(mode==='kr'){
    html=`<div class="qw sp-word" onclick="speakWordOnly('${w.w}')" title="클릭하여 발음 듣기">${w.w}<button class="tts-q-btn">🔊</button></div><div class="qs">(${w.pos||'?'}) 한글 뜻을 입력하세요 (2음절 이상 일치 시 정답)</div>
      <input class="sinp" id="kr-inp" placeholder="한글 뜻을 입력하세요" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn tl full" onclick="checkKR()" style="margin-top:10px">확인</button>`;
  }
  document.getElementById('qcard').innerHTML=html;
  document.getElementById('t-fb').style.display='none';
  document.getElementById('t-next').style.display='none';

  // 스펠링 모드에서 엔터 입력
  const inp=document.getElementById('sp-inp');
  if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkSP();});
  // 한글 뜻 입력 모드에서 엔터 입력
  const krInp=document.getElementById('kr-inp');
  if(krInp) krInp.addEventListener('keydown',e=>{if(e.key==='Enter')checkKR();});
}

function checkMC(btn,ans){
  const w=testWords[testIdx];
  const correct=ans===w.m||ans===w.w;
  document.querySelectorAll('.mc-opt').forEach(b=>{
    b.disabled=true;
    if(b===btn) b.classList.add(correct?'ok':'ng');
  });
  showFB(correct,w);
}

function checkSP(){
  const w=testWords[testIdx];
  const inp=document.getElementById('sp-inp');
  if(!inp)return;
  const val=inp.value.trim().toLowerCase();
  // 한글뜻 정답 체크: 공백·조사 차이 허용을 위해 핵심어 포함 여부로 판정
  const normalize = s => s.replace(/[\s,;·]/g,'').toLowerCase();
  const answerKey = normalize(w.m.split('(')[0].split(';')[0].split(',')[0]);
  const correct = normalize(val).includes(answerKey) || answerKey.includes(normalize(val)) && normalize(val).length >= 2;
  inp.style.borderColor=correct?'var(--tll)':'#f5c6c6';
  showFB(correct,w);
}

function checkKR(){
  const w=testWords[testIdx];
  const inp=document.getElementById('kr-inp');
  if(!inp)return;
  const val=inp.value.trim().replace(/\s+/g,'');
  if(!val){return;}
  // 한글 뜻에서 순수 한글 단어들을 추출 (괄호, 영어, 기호 제거)
  const meaning=w.m;
  // 2음절 이상 연속 한글이 입력값에 포함되는지 확인
  // 입력값이 2음절 미만이면 오답
  const krChars=val.replace(/[^가-힣]/g,'');
  if(krChars.length<2){
    inp.style.borderColor='#f5c6c6';
    showFB(false,w);
    return;
  }
  // 정답 뜻 문자열에서 공백/기호 제거한 버전
  const cleanMeaning=meaning.replace(/\s+/g,'');
  // 입력값(2음절 이상 한글)이 뜻에 포함되면 정답
  const correct=cleanMeaning.includes(krChars);
  inp.style.borderColor=correct?'var(--tll)':'#f5c6c6';
  showFB(correct,w);
}

function showFB(correct,w){
  if(correct) testOk++; else{testNg++;wrongList.push(w);}
  document.getElementById('hearts').textContent='💔'.repeat(testNg);
  const fb=document.getElementById('t-fb');
  fb.style.display='block';
  fb.className=correct?'fb-ok':'fb-ng';
  const wordSpan=`<span onclick="speakWordOnly('${w.w}')" style="cursor:pointer;border-radius:6px;padding:1px 4px;transition:background .15s" onmouseover="this.style.background='var(--tl)'" onmouseout="this.style.background=''" title="클릭하여 발음 듣기"><strong>${w.w}</strong> 🔊</span>`;
  fb.innerHTML=correct
    ?`✅ 정답! ${wordSpan} — ${w.m}`
    :`❌ 오답. 정답: ${wordSpan} — ${w.m}<br><small style="opacity:.8">${w.ex?w.ex.replace(/<[^>]+>/g,''):''}</small>`;
  document.getElementById('t-next').style.display='flex';
}

function nextQ(){
  testIdx++;
  if(testIdx>=testWords.length) showResult();
  else renderQ();
}

function showResult(){
  TTS.stop();
  const total=testWords.length;
  const ok=testOk, pct=total>0?Math.round((ok/total)*100):100;
  const emojis=pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
  const msgs=pct===100?'완벽해요!':pct>=80?'잘했어요!':pct>=60?'조금 더 연습해봐요':'더 연습이 필요해요, 화이팅!';
  document.getElementById('r-emoji').textContent=emojis;
  document.getElementById('r-score').textContent=`${ok} / ${total} (${pct}%)`;
  document.getElementById('r-msg').textContent=msgs;
  if(wrongList.length>0){
    document.getElementById('r-wrong').innerHTML=`<div class="card"><div class="sec">틀린 단어</div>
      ${wrongList.map(w=>`<div class="witem"><strong>${w.w}</strong> — ${w.m}</div>`).join('')}</div>`;
  } else document.getElementById('r-wrong').innerHTML='';
  showScreen('s-result');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function toHome(){TTS.stop();showScreen('s-home');}
function showNotif(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2000);
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
